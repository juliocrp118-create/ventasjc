<script>

const firebaseConfig = {
 apiKey: "AIzaSyDgTmtl4VoF2UahIDZGVwQ11TuayHv2eHw",
 authDomain: "ventasjc-b1a1d.firebaseapp.com",
 projectId: "ventasjc-b1a1d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 LOCAL STORAGE (NUEVO)
let productos = JSON.parse(localStorage.getItem("productos")) || [];

function guardarLocal(){
 localStorage.setItem("productos", JSON.stringify(productos));
}

let conteoData={potes:0,tinas:0};

let gPotes=0, gTinas=0;
let rPotes=0, rTinas=0;
let hPotes=0, hTinas=0;

// LOGIN
function login(){
 let u=user.value.trim();
 let p=pass.value.trim();
 if(u==="Julio" && p==="1234*"){
  loginDiv.style.display="none";
  app.style.display="block";
 }else{
  alert("Datos incorrectos");
 }
}

function logout(){
 app.style.display="none";
 loginDiv.style.display="flex";
}

// 🔥 AGREGAR
function agregar(){

 let c = +costo.value;
 let tipo = "";

 if(c === 850){
   tipo = "pote";
 }else if(c === 2900){
   tipo = "tina";
 }else{
   alert("Costo inválido");
   return;
 }

 let nuevo = {
  nombre:nombre.value,
  stock:+stock.value,
  costo:c,
  precio:+precio.value,
  tipo:tipo,
  fecha:new Date()
 };

 // LOCAL
 productos.push(nuevo);
 guardarLocal();

 // FIREBASE
 db.collection("productos").add({
  ...nuevo,
  fecha: firebase.firestore.FieldValue.serverTimestamp()
 });

 render();
}

// 🔥 SINCRONIZACIÓN
db.collection("productos")
.orderBy("fecha","asc")
.onSnapshot(snapshot=>{
 productos=[];

 snapshot.forEach(doc=>{
  let d=doc.data();
  d.id=doc.id;

  // 🔥 CONVERTIR FECHA
  if(d.fecha && d.fecha.toDate){
    d.fecha = d.fecha.toDate();
  }

  productos.push(d);
 });

 guardarLocal(); // 🔥 GUARDA LOCAL
 render();
});

// VENDER
function vender(id,i){
 let p=productos[i];
 if(p.stock<=0)return;

 p.stock--;

 guardarLocal();

 db.collection("productos").doc(id).update({stock:p.stock});

 let g=p.precio-p.costo;

 if(p.tipo==="pote"){
  gPotes+=g;
  rPotes+=p.costo;
  hPotes+=p.precio;
  conteoData.potes++;
 }else{
  gTinas+=g;
  rTinas+=p.costo;
  hTinas+=p.precio;
  conteoData.tinas++;
 }

 render();
}

// EDITAR
function editar(id,i){
 let n=prompt("Nuevo stock:",productos[i].stock);
 if(n!==null){

  productos[i].stock=+n;
  guardarLocal();

  db.collection("productos").doc(id).update({stock:+n});

  render();
 }
}

// ELIMINAR
function eliminar(id){
 productos = productos.filter(p => p.id !== id);

 guardarLocal();

 db.collection("productos").doc(id).delete();
}

// REINICIAR
function reiniciar(){
 conteoData={potes:0,tinas:0};
 gPotes=gTinas=0;
 rPotes=rTinas=0;
 hPotes=hTinas=0;
 render();
}

// 🔥 EXPORTAR JSON
function exportar(){
 let archivo=new Blob([JSON.stringify(productos,null,2)],{type:"application/json"});
 let url=URL.createObjectURL(archivo);

 let a=document.createElement("a");
 a.href=url;
 a.download="productos.json";
 a.click();
}

// 🔥 IMPORTAR (ARREGLADO)
function importar(e){
 let archivo=e.target.files[0];
 if(!archivo)return;

 let lector=new FileReader();

 lector.onload=function(ev){
  let datos=JSON.parse(ev.target.result);

  datos.forEach(p=>{
    productos.push(p); // 🔥 LOCAL
    db.collection("productos").add(p); // 🔥 FIREBASE
  });

  guardarLocal();
  render();

  alert("Importado correctamente");
 };

 lector.readAsText(archivo);
}

// 🔥 EXPORTAR EXCEL
function exportarExcel(){

 let datos=productos.map(p=>({
   Nombre:p.nombre,
   Stock:p.stock,
   Costo:p.costo,
   Precio:p.precio,
   Tipo:p.tipo
 }));

 let hoja=XLSX.utils.json_to_sheet(datos);
 let libro=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(libro,hoja,"Productos");

 XLSX.writeFile(libro,"productos.xlsx");
}

// 🔥 RENDER
function render(){

 let pHTML="",tHTML="";
 let invP=0,invT=0;

 productos.forEach((p,i)=>{

   if(p.tipo==="pote") invP+=p.stock*p.costo;
   else invT+=p.stock*p.costo;

   let card=`
   <div class='card'>
   ${p.nombre}<br>
   Stock:${p.stock}<br>
   <button onclick="vender('${p.id}',${i})">Vender</button>
   <button onclick="editar('${p.id}',${i})">Editar</button>
   <button onclick="eliminar('${p.id}')">Eliminar</button>
   </div>`;

   if(p.tipo==="pote") pHTML+=card;
   else tHTML+=card;
 });

 potes.innerHTML=pHTML;
 tinas.innerHTML=tHTML;

 conteoTexto.innerHTML=`Potes:${conteoData.potes} | Tinas:${conteoData.tinas}`;

 gananciasPotes.innerText=gPotes;
 gananciasTinas.innerText=gTinas;

 inversionPotes.innerText=invP;
 inversionTinas.innerText=invT;

 reinvertirPotes.innerText=rPotes;
 reinvertirTinas.innerText=rTinas;

 hoyPotes.innerText=hPotes;
 hoyTinas.innerText=hTinas;
}

// 🔥 INICIO (IMPORTANTE)
render();

</script>
