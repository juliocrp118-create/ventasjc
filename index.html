<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VentasJC</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: url('fondo.jpg') no-repeat center center fixed;
  background-size: cover;
}

.overlay{
  background:rgba(0,0,0,0.45);
  min-height:100vh;
  padding:20px;
  color:white;
}

#loginDiv{display:flex;justify-content:center;align-items:center}

.login-box{
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:15px;
  text-align:center;
}

input{margin:5px;padding:10px;border-radius:8px;border:none}
button{padding:10px;margin:5px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.agregar{background:#00c853;color:white}
.logout{background:#ff5252;color:white;float:right}

.flex{display:flex;gap:20px}
.col{flex:1}

.card{background:white;color:black;padding:15px;margin:10px 0;border-radius:12px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginDiv" class="overlay">
  <div class="login-box">
    <h2>Login VentasJC</h2>
    <input id="user" placeholder="Usuario"><br>
    <input id="pass" type="password" placeholder="Contraseña"><br>
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="overlay" style="display:none;">

<button class="logout" onclick="logout()">Cerrar sesión</button>

<h2>VentasJC</h2>

<input id="nombre" placeholder="Nombre">
<input id="stock" placeholder="Inventario inicial">
<input id="costo" placeholder="Costo (850 o 2900)">
<input id="precio" placeholder="Precio">
<button class="agregar" onclick="agregar()">Agregar</button>

<div class="flex">
<div class="col"><h3>Potes 1L</h3><div id="potes"></div></div>
<div class="col"><h3>Tinas 4L</h3><div id="tinas"></div></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

// 🔐 LOGIN (CORREGIDO)
function login(){
 let u = document.getElementById("user").value.trim();
 let p = document.getElementById("pass").value.trim();

 if(u === "Julio" && p === "1234*"){
   document.getElementById("loginDiv").style.display = "none";
   document.getElementById("app").style.display = "block";
 } else {
   alert("Usuario o contraseña incorrecta");
 }
}

function logout(){
 document.getElementById("app").style.display = "none";
 document.getElementById("loginDiv").style.display = "flex";
}

// 🔥 FIREBASE
const firebaseConfig = {
 apiKey: "AIzaSyDgTmtl4VoF2UahIDZGVwQ11TuayHv2eHw",
 authDomain: "ventasjc-b1a1d.firebaseapp.com",
 projectId: "ventasjc-b1a1d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let productos=[];

// 🔥 AGREGAR
function agregar(){

 let c = +document.getElementById("costo").value;
 let tipo = "";

 if(c === 850){
   tipo = "pote";
 }else if(c === 2900){
   tipo = "tina";
 }else{
   alert("Costo inválido");
   return;
 }

 let cantidad = +document.getElementById("stock").value;

 db.collection("productos").add({
  nombre:document.getElementById("nombre").value,
  stock:cantidad,
  inventario:cantidad,
  ventas:0,
  costo:c,
  precio:+document.getElementById("precio").value,
  tipo:tipo,
  fecha: firebase.firestore.FieldValue.serverTimestamp()
 });
}

// 🔥 REALTIME
db.collection("productos")
.orderBy("fecha","asc")
.onSnapshot(snapshot=>{
 productos=[];
 snapshot.forEach(doc=>{
  let d=doc.data(); d.id=doc.id;
  productos.push(d);
 });
 render();
});

// 🔥 VENDER
function vender(id,i){
 let p=productos[i];
 if(p.stock<=0)return;

 db.collection("productos").doc(id).update({
   stock:p.stock-1,
   ventas:(p.ventas||0)+1
 });
}

// 🔥 ELIMINAR
function eliminar(id){
 db.collection("productos").doc(id).delete();
}

// 🔥 RENDER
function render(){

 let pHTML="",tHTML="";

 productos.forEach((p,i)=>{

   let card=`
   <div class='card'>
   <b>${p.nombre}</b><br>
   🧾 Inventario: ${p.inventario || 0}<br>
   📦 Disponibles: ${p.stock}<br>
   📊 Ventas: ${p.ventas || 0}<br><br>

   <button onclick="vender('${p.id}',${i})">Vender</button>
   <button onclick="eliminar('${p.id}')">Eliminar</button>
   </div>`;

   if(p.tipo==="pote") pHTML+=card;
   else tHTML+=card;
 });

 document.getElementById("potes").innerHTML=pHTML;
 document.getElementById("tinas").innerHTML=tHTML;
}

</script>

</body>
</html>
