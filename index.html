<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VentasJC PRO</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: url('fondo.jpg') no-repeat center center fixed;
  background-size: cover;
}

.overlay{
  background:rgba(0,0,0,0.45);
  min-height:100vh;
  padding:20px;
  color:white;
}

#loginDiv{display:flex;justify-content:center;align-items:center}

.login-box{
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:15px;
  text-align:center;
}

input{margin:5px;padding:10px;border-radius:8px;border:none}
button{padding:10px;margin:5px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.agregar{background:#00c853;color:white}
.logout{background:#ff5252;color:white;float:right}

.flex{display:flex;gap:20px}
.col{flex:1}

.titulo{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  padding:8px;
  border-radius:10px;
  background:rgba(0,0,0,0.4);
  margin-bottom:10px;
}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
}

.info-row{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  text-align:center;
}

.info-box{flex:1;}

.info-box span{
  font-size:12px;
  color:gray;
}

.info-box b{
  display:block;
  font-size:16px;
  margin-top:3px;
}

.grid{
  display:flex;
  gap:20px;
  margin-top:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.box{
  background:white;
  color:black;
  padding:15px;
  border-radius:12px;
  width:220px;
  text-align:center;
  font-weight:bold;
}

.center{text-align:center;margin-top:20px}
</style>
</head>

<body>

<div id="loginDiv" class="overlay">
  <div class="login-box">
    <h2>Login VentasJC</h2>
    <input id="user" placeholder="Usuario"><br>
    <input id="pass" type="password" placeholder="Contraseña"><br>
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" class="overlay" style="display:none;">

<button class="logout" onclick="logout()">Cerrar sesión</button>

<h2>VentasJC PRO 🍦</h2>

<input id="nombre" placeholder="Nombre">
<input id="stock" placeholder="Inventario">
<input id="costo" placeholder="Costo (850 o 2900)">
<input id="precio" placeholder="Precio">
<button class="agregar" onclick="agregar()">Agregar</button>

<div class="flex">
<div class="col">
  <h3 class="titulo">🍦 Potes 1L</h3>
  <div id="potes"></div>
</div>

<div class="col">
  <h3 class="titulo">🪣 Tinas 4L</h3>
  <div id="tinas"></div>
</div>
</div>

<div class="grid">
<div class="box">💰 Ganancias<br>Potes: <span id="gananciasPotes">0</span><br>Tinas: <span id="gananciasTinas">0</span></div>
<div class="box">📦 Inversión<br>Potes: <span id="inversionPotes">0</span><br>Tinas: <span id="inversionTinas">0</span></div>
<div class="box">🔄 Reinvertir<br>Potes: <span id="reinvertirPotes">0</span><br>Tinas: <span id="reinvertirTinas">0</span></div>
<div class="box">💵 Hoy<br>Potes: <span id="hoyPotes">0</span><br>Tinas: <span id="hoyTinas">0</span></div>
<div class="box">📊 Ventas<br>Potes: <span id="ventasPotes">0</span><br>Tinas: <span id="ventasTinas">0</span></div>
<div class="box">📦 Disponibles<br>Potes: <span id="dispPotes">0</span><br>Tinas: <span id="dispTinas">0</span></div>
</div>

<div class="center">
<button onclick="reiniciar()">Reiniciar</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyDgTmtl4VoF2UahIDZGVwQ11TuayHv2eHw",
 authDomain: "ventasjc-b1a1d.firebaseapp.com",
 projectId: "ventasjc-b1a1d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let productos=[];
let conteoData={potes:0,tinas:0};

// 🔥 ENTER LOGIN
user.addEventListener("keydown", e=>{
 if(e.key==="Enter") login();
});

pass.addEventListener("keydown", e=>{
 if(e.key==="Enter") login();
});

// 🔥 AUTOFOCUS
window.onload = ()=> user.focus();

function login(){
 if(user.value==="Julio" && pass.value==="1234*"){
  loginDiv.style.display="none";
  app.style.display="block";
 } else alert("Datos incorrectos");
}

function logout(){
 app.style.display="none";
 loginDiv.style.display="flex";
}

function agregar(){
 let c=+costo.value;
 let tipo = c===850?"pote":c===2900?"tina":null;
 if(!tipo)return alert("Costo inválido");

 let cantidad=+stock.value;

 db.collection("productos").add({
  nombre:nombre.value,
  stock:cantidad,
  inventario:cantidad,
  ventas:0,
  costo:c,
  precio:+precio.value,
  tipo:tipo
 });
}

db.collection("productos").onSnapshot(s=>{
 productos=[];
 s.forEach(d=>{let x=d.data();x.id=d.id;productos.push(x);});
 render();
});

function render(){
 let html="";
 productos.forEach(p=>{
  html+=`<div class='card'>${p.nombre}</div>`;
 });
 potes.innerHTML=html;
 tinas.innerHTML="";
}

</script>

</body>
</html>
