<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VentasJC Híbrido</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: url('fondo.jpg') no-repeat center center fixed;
  background-size: cover;
}
.overlay{
  background:rgba(0,0,0,0.45);
  min-height:100vh;
  padding:20px;
  color:white;
}
#loginDiv{display:flex;justify-content:center;align-items:center}
.login-box{
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:15px;
  text-align:center;
}
input{margin:5px;padding:10px;border-radius:8px;border:none}
button{padding:10px;margin:5px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.agregar{background:#00c853;color:white}
.logout{background:#ff5252;color:white;float:right}
.flex{display:flex;gap:20px}
.col{flex:1}
.card{background:white;color:black;padding:15px;margin:10px 0;border-radius:12px}
.grid{display:flex;gap:20px;margin-top:20px;flex-wrap:wrap;justify-content:center}
.box{background:white;color:black;padding:15px;border-radius:12px;width:220px;text-align:center;font-weight:bold}
.center{text-align:center;margin-top:20px}
</style>
</head>

<body>

<div id="loginDiv" class="overlay">
  <div class="login-box">
    <h2>Login VentasJC</h2>
    <input id="user" placeholder="Usuario"><br>
    <input id="pass" type="password" placeholder="Contraseña"><br>
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" class="overlay" style="display:none;">

<button class="logout" onclick="logout()">Cerrar sesión</button>

<h2>VentasJC</h2>

<input id="nombre" placeholder="Nombre">
<input id="stock" placeholder="Stock">
<input id="costo" placeholder="Costo (850 o 2900)">
<input id="precio" placeholder="Precio">
<button class="agregar" onclick="agregar()">Agregar</button>

<div class="flex">
<div class="col"><h3>Potes</h3><div id="potes"></div></div>
<div class="col"><h3>Tinas</h3><div id="tinas"></div></div>
</div>

<div class="center">
<button onclick="exportar()">📤 Exportar</button>
<input type="file" onchange="importar(event)">
<button onclick="exportarExcel()">📊 Excel</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyDgTmtl4VoF2UahIDZGVwQ11TuayHv2eHw",
 authDomain: "ventasjc-b1a1d.firebaseapp.com",
 projectId: "ventasjc-b1a1d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 LOCAL
let productos = JSON.parse(localStorage.getItem("productos")) || [];

function guardar(){
 localStorage.setItem("productos", JSON.stringify(productos));
}

function online(){
 return navigator.onLine;
}

// LOGIN
function login(){
 if(user.value==="Julio" && pass.value==="1234*"){
  loginDiv.style.display="none";
  app.style.display="block";
 }
}

function logout(){
 app.style.display="none";
 loginDiv.style.display="flex";
}

// AGREGAR
function agregar(){

 let c=+costo.value;
 let tipo="";

 if(c===850) tipo="pote";
 else if(c===2900) tipo="tina";
 else return alert("Costo inválido");

 let nuevo={
  id: Date.now().toString(),
  nombre:nombre.value,
  stock:+stock.value,
  costo:c,
  precio:+precio.value,
  tipo:tipo,
  fecha:new Date()
 };

 productos.push(nuevo);
 guardar();
 render();

 if(online()){
  db.collection("productos").doc(nuevo.id).set({
    ...nuevo,
    fecha: firebase.firestore.FieldValue.serverTimestamp()
  });
 }
}

// 🔥 SINCRONIZACIÓN
if(online()){
 db.collection("productos").onSnapshot(snapshot=>{

  let nube=[];

  snapshot.forEach(doc=>{
    let d=doc.data();

    if(d.fecha && d.fecha.toDate){
      d.fecha=d.fecha.toDate();
    }

    nube.push(d);
  });

  let mapa={};

  [...productos,...nube].forEach(p=>{
    mapa[p.id]=p;
  });

  productos=Object.values(mapa);

  guardar();
  render();
 });
}

// VENDER
function vender(i){
 let p=productos[i];
 if(p.stock<=0)return;

 p.stock--;
 guardar();
 render();

 if(online()){
  db.collection("productos").doc(p.id).update({stock:p.stock});
 }
}

// EDITAR
function editar(i){
 let n=prompt("Nuevo stock:",productos[i].stock);
 if(n!==null){
  productos[i].stock=+n;
  guardar();
  render();

  if(online()){
    db.collection("productos").doc(productos[i].id).update({stock:+n});
  }
 }
}

// ELIMINAR
function eliminar(i){
 let p=productos[i];
 productos.splice(i,1);
 guardar();
 render();

 if(online()){
  db.collection("productos").doc(p.id).delete();
 }
}

// RENDER
function render(){

 productos.sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));

 let pHTML="",tHTML="";

 productos.forEach((p,i)=>{

   let card=`
   <div class='card'>
   ${p.nombre}<br>
   Stock:${p.stock}<br>
   <button onclick="vender(${i})">Vender</button>
   <button onclick="editar(${i})">Editar</button>
   <button onclick="eliminar(${i})">Eliminar</button>
   </div>`;

   if(p.tipo==="pote") pHTML+=card;
   else tHTML+=card;
 });

 potes.innerHTML=pHTML;
 tinas.innerHTML=tHTML;
}

// EXPORTAR
function exportar(){
 let blob=new Blob([JSON.stringify(productos,null,2)]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="backup.json";
 a.click();
}

// IMPORTAR
function importar(e){
 let file=e.target.files[0];
 let reader=new FileReader();

 reader.onload=function(ev){
  let datos=JSON.parse(ev.target.result);

  datos.forEach(p=>{
    p.id=p.id||Date.now()+Math.random();
    productos.push(p);

    if(online()){
      db.collection("productos").doc(p.id).set(p);
    }
  });

  guardar();
  render();
 };

 reader.readAsText(file);
}

// EXCEL
function exportarExcel(){

 let datos=productos.map(p=>({
  Nombre:p.nombre,
  Stock:p.stock,
  Costo:p.costo,
  Precio:p.precio,
  Tipo:p.tipo
 }));

 let hoja=XLSX.utils.json_to_sheet(datos);
 let libro=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(libro,hoja,"Productos");
 XLSX.writeFile(libro,"productos.xlsx");
}

render();

</script>

</body>
</html>
