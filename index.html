<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VentasJC</title>
<style>
body{
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
}
.hidden{display:none}
.overlay{background:rgba(0,0,0,0.6);min-height:100vh;padding:20px;color:white}
input{margin:5px;padding:10px;border-radius:8px;border:none;width:200px}
button{padding:10px 15px;margin:5px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.agregar{background:#00c853;color:white}
.logout{background:#ff5252;color:white;float:right}
.flex{display:flex;gap:20px}
.col{flex:1}
.card{background:white;color:black;padding:15px;margin:10px 0;border-radius:15px;box-shadow:0 4px 10px rgba(0,0,0,0.3)}
.card button{background:#1976d2;color:white}
.center{text-align:center;margin-top:20px}
.table{background:white;color:black;padding:15px;border-radius:15px;display:inline-block;box-shadow:0 4px 10px rgba(0,0,0,0.3)}
h2,h3{text-shadow:1px 1px 3px black}
</style>
</head>
<body>

<div id="loginDiv" class="overlay">
  <h2>Login VentasJC</h2>
  <input id="user" placeholder="Usuario"><br>
  <input id="pass" type="password" placeholder="Contraseña"><br>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" class="overlay" style="display:none;">
<button class="logout" onclick="logout()">Cerrar sesión</button>

<h2>VentasJC</h2>

<input id="nombre" placeholder="Nombre">
<input id="stock" placeholder="Stock">
<input id="costo" placeholder="Costo">
<input id="precio" placeholder="Precio">
<button class="agregar" onclick="agregar()">Agregar</button>

<div class="flex">
<div class="col"><h3>Potes</h3><div id="potes"></div></div>
<div class="col"><h3>Tinas</h3><div id="tinas"></div></div>
</div>

<div class="center">
  <div class="table">
    <h3>Ventas</h3>
    <p id="conteoTexto"></p>
  </div>
  <br>
  <button onclick="reiniciar()">Reiniciar Conteo</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgTmtl4VoF2UahIDZGVwQ11TuayHv2eHw",
  authDomain: "ventasjc-b1a1d.firebaseapp.com",
  projectId: "ventasjc-b1a1d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let productos = [];
let conteoData = {potes:0,tinas:0};

function login(){
 let usuario = document.getElementById("user").value.trim();
 let clave = document.getElementById("pass").value.trim();

 if(usuario === "Julio" && clave === "1234*"){
   document.getElementById("loginDiv").style.display = "none";
   document.getElementById("app").style.display = "block";
 }
}

function logout(){
 document.getElementById("app").style.display = "none";
 document.getElementById("loginDiv").style.display = "block";
}

function agregar(){
 let nuevo = {
   nombre:nombre.value,
   stock:+stock.value,
   costo:+costo.value,
   precio:+precio.value,
   tipo:(+costo.value)==850?"pote":"tina"
 };
 db.collection("productos").add(nuevo);
}

db.collection("productos").onSnapshot(snapshot=>{
 productos=[];
 snapshot.forEach(doc=>{
   let data=doc.data();
   data.id=doc.id;
   productos.push(data);
 });
 render();
});

function vender(id,i){
 if(productos[i].stock<=0)return;
 let nuevoStock = productos[i].stock-1;
 if(productos[i].tipo=="pote") conteoData.potes++;
 else conteoData.tinas++;
 db.collection("productos").doc(id).update({stock:nuevoStock});
}

function eliminar(id){
 db.collection("productos").doc(id).delete();
}

function reiniciar(){
 conteoData={potes:0,tinas:0};
 render();
}

function render(){
 let pHTML="",tHTML="";
 productos.forEach((p,i)=>{
 let card=`<div class='card'>
 ${p.nombre}<br>
 Stock:${p.stock}<br>
 <button onclick="vender('${p.id}',${i})">Vender</button>
 <button onclick="eliminar('${p.id}')">Eliminar</button>
 </div>`;
 if(p.tipo==="pote") pHTML+=card;
 else tHTML+=card;
 });
 potes.innerHTML=pHTML;
 tinas.innerHTML=tHTML;
 conteoTexto.innerHTML="Potes vendidos: "+conteoData.potes+"<br>Tinas vendidos: "+conteoData.tinas;
}
</script>

</body>
</html>
