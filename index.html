<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VentasJC PRO</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: url('fondo.jpg') no-repeat center center fixed;
  background-size: cover;
}

.overlay{
  background:rgba(0,0,0,0.45);
  min-height:100vh;
  padding:20px;
  color:white;
}

input{
  margin:5px;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.agregar{background:#00c853;color:white}
.logout{background:#ff5252;color:white;float:right}

.flex{display:flex;gap:20px}
.col{flex:1}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.grid{
 display:flex;
 gap:20px;
 margin-top:20px;
 flex-wrap:wrap;
}

.box{
 background:white;
 color:black;
 padding:15px;
 border-radius:12px;
 flex:1;
 text-align:center;
 font-weight:bold;
 box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.center{text-align:center;margin-top:20px}
h2,h3{text-shadow:1px 1px 4px black}
</style>

</head>

<body>

<div id="loginDiv" class="overlay">
<h2>Login VentasJC</h2>
<input id="user" placeholder="Usuario"><br>
<input id="pass" type="password" placeholder="Contraseña"><br>
<button onclick="login()">Entrar</button>
</div>

<div id="app" class="overlay" style="display:none;">

<button class="logout" onclick="logout()">Cerrar sesión</button>

<h2>VentasJC PRO</h2>

<input id="nombre" placeholder="Nombre">
<input id="stock" placeholder="Stock">
<input id="costo" placeholder="Costo">
<input id="precio" placeholder="Precio">
<button class="agregar" onclick="agregar()">Agregar</button>

<div class="flex">
<div class="col"><h3>Potes 1L</h3><div id="potes"></div></div>
<div class="col"><h3>Tinas 4L</h3><div id="tinas"></div></div>
</div>

<div class="grid">
  <div class="box">💰 Ganancias<br><span id="ganancias">0</span></div>
  <div class="box">📦 Inversión<br><span id="inversion">0</span></div>
  <div class="box">🔄 Reinvertir<br><span id="reinvertir">0</span></div>
  <div class="box">💵 Hoy<br><span id="cajaHoy">0</span> CUP</div>
</div>

<div class="center">
<h3>Ventas</h3>
<p id="conteoTexto"></p>
<button onclick="reiniciar()">Reiniciar Conteo</button>
<button onclick="exportar()">Exportar Excel</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDgTmtl4VoF2UahIDZGVwQ11TuayHv2eHw",
  authDomain: "ventasjc-b1a1d.firebaseapp.com",
  projectId: "ventasjc-b1a1d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let productos = [];
let conteoData = {potes:0,tinas:0};
let totalGanancias = 0;
let totalInversion = 0;
let totalReinvertir = 0;
let cajaHoy = 0;

// 🔥 cargar datos
if(localStorage.getItem("datos")){
 let d = JSON.parse(localStorage.getItem("datos"));
 totalGanancias = d.ganancias || 0;
 totalInversion = d.inversion || 0;
 totalReinvertir = d.reinvertir || 0;
 conteoData = d.conteo || {potes:0,tinas:0};
 cajaHoy = d.cajaHoy || 0;
}

function guardarDatos(){
 localStorage.setItem("datos", JSON.stringify({
   ganancias: totalGanancias,
   inversion: totalInversion,
   reinvertir: totalReinvertir,
   conteo: conteoData,
   cajaHoy: cajaHoy
 }));
}

function login(){
 let usuario = user.value.trim();
 let clave = pass.value.trim();
 if(usuario === "Julio" && clave === "1234*"){
   loginDiv.style.display = "none";
   app.style.display = "block";
 }
}

function logout(){
 app.style.display = "none";
 loginDiv.style.display = "block";
}

function agregar(){
 let nuevo = {
   nombre:nombre.value,
   stock:+stock.value,
   costo:+costo.value,
   precio:+precio.value,
   tipo:(+costo.value)==850?"pote":"tina"
 };
 db.collection("productos").add(nuevo);
}

db.collection("productos").onSnapshot(snapshot=>{
 productos=[];
 snapshot.forEach(doc=>{
   let data=doc.data();
   data.id=doc.id;
   productos.push(data);
 });
 render();
});

function vender(id,i){
 if(productos[i].stock<=0)return;
 let p = productos[i];
 db.collection("productos").doc(id).update({stock:p.stock-1});
 let ganancia = p.precio - p.costo;
 totalGanancias += ganancia;
 totalInversion += p.costo;
 totalReinvertir += p.costo;
 cajaHoy += p.precio;
 if(p.tipo=="pote") conteoData.potes++;
 else conteoData.tinas++;
 guardarDatos();
 render();
}

function eliminar(id){
 db.collection("productos").doc(id).delete();
}

function reiniciar(){
 conteoData={potes:0,tinas:0};
 totalGanancias=0;
 totalInversion=0;
 totalReinvertir=0;
 cajaHoy=0;
 guardarDatos();
 render();
}

function exportar(){
 let data = [["Producto","Costo","Precio","Ganancia"]];
 productos.forEach(p=>{
   data.push([p.nombre,p.costo,p.precio,p.precio-p.costo]);
 });
 let csv = data.map(e=>e.join(",")).join("\n");
 let blob = new Blob([csv], { type: "text/csv" });
 let url = URL.createObjectURL(blob);
 let a = document.createElement("a");
 a.href = url;
 a.download = "ventas.csv";
 a.click();
}

function render(){
 let pHTML="",tHTML="";
 productos.forEach((p,i)=>{
 let card=`<div class='card'>
 ${p.nombre}<br>
 Stock:${p.stock}<br>
 <button onclick="vender('${p.id}',${i})">Vender</button>
 <button onclick="eliminar('${p.id}')">Eliminar</button>
 </div>`;
 if(p.tipo==="pote") pHTML+=card;
 else tHTML+=card;
 });
 potes.innerHTML=pHTML;
 tinas.innerHTML=tHTML;
 conteoTexto.innerHTML = "Potes: "+conteoData.potes+" | Tinas: "+conteoData.tinas;
 ganancias.innerText = totalGanancias;
 inversion.innerText = totalInversion;
 reinvertir.innerText = totalReinvertir;
 cajaHoy.innerText = cajaHoy;
}

</script>

</body>
</html>
