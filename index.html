<script>

const firebaseConfig = {
 apiKey: "AIzaSyDgTmtl4VoF2UahIDZGVwQ11TuayHv2eHw",
 authDomain: "ventasjc-b1a1d.firebaseapp.com",
 projectId: "ventasjc-b1a1d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 LOCAL STORAGE
let productos = JSON.parse(localStorage.getItem("productos")) || [];

// 🔥 GUARDAR LOCAL
function guardarLocal(){
 localStorage.setItem("productos", JSON.stringify(productos));
}

// 🔥 DETECTAR INTERNET
function online(){
 return navigator.onLine;
}

// LOGIN
function login(){
 let u=user.value.trim();
 let p=pass.value.trim();
 if(u==="Julio" && p==="1234*"){
  loginDiv.style.display="none";
  app.style.display="block";
 }
}

function logout(){
 app.style.display="none";
 loginDiv.style.display="flex";
}

// 🔥 AGREGAR
function agregar(){

 let c = +costo.value;
 let tipo = "";

 if(c===850) tipo="pote";
 else if(c===2900) tipo="tina";
 else return alert("Costo inválido");

 let nuevo={
  id: Date.now().toString(),
  nombre:nombre.value,
  stock:+stock.value,
  costo:c,
  precio:+precio.value,
  tipo:tipo,
  fecha:new Date()
 };

 // LOCAL
 productos.push(nuevo);
 guardarLocal();
 render();

 // NUBE
 if(online()){
   db.collection("productos").doc(nuevo.id).set(nuevo);
 }
}

// 🔥 SINCRONIZACIÓN NUBE → LOCAL
if(online()){
 db.collection("productos").onSnapshot(snapshot=>{
  
  let nube=[];

  snapshot.forEach(doc=>{
    nube.push(doc.data());
  });

  // 🔥 MEZCLA INTELIGENTE
  let mapa={};

  [...productos,...nube].forEach(p=>{
    mapa[p.id]=p;
  });

  productos=Object.values(mapa);

  guardarLocal();
  render();
 });
}

// 🔥 VENDER
function vender(id,i){
 let p=productos[i];
 if(p.stock<=0)return;

 p.stock--;

 guardarLocal();
 render();

 if(online()){
  db.collection("productos").doc(p.id).update({
    stock:p.stock
  });
 }
}

// 🔥 EDITAR
function editar(id,i){
 let n=prompt("Nuevo stock:",productos[i].stock);
 if(n!==null){
  productos[i].stock=+n;

  guardarLocal();
  render();

  if(online()){
    db.collection("productos").doc(productos[i].id).update({
      stock:+n
    });
  }
 }
}

// 🔥 ELIMINAR
function eliminar(id,i){
 let p=productos[i];

 productos.splice(i,1);
 guardarLocal();
 render();

 if(online()){
  db.collection("productos").doc(p.id).delete();
 }
}

// 🔥 RENDER
function render(){

 productos.sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));

 let pHTML="",tHTML="";
 let invP=0,invT=0;

 productos.forEach((p,i)=>{

   if(p.tipo==="pote") invP+=p.stock*p.costo;
   else invT+=p.stock*p.costo;

   let card=`
   <div class='card'>
   ${p.nombre}<br>
   Stock:${p.stock}<br>
   <button onclick="vender('${p.id}',${i})">Vender</button>
   <button onclick="editar('${p.id}',${i})">Editar</button>
   <button onclick="eliminar('${p.id}',${i})">Eliminar</button>
   </div>`;

   if(p.tipo==="pote") pHTML+=card;
   else tHTML+=card;
 });

 potes.innerHTML=pHTML;
 tinas.innerHTML=tHTML;

 conteoTexto.innerHTML=`Total: ${productos.length}`;

 inversionPotes.innerText=invP;
 inversionTinas.innerText=invT;
}

// 🔥 EXPORTAR JSON (LOCAL)
function exportar(){
 let archivo=new Blob([JSON.stringify(productos,null,2)],{type:"application/json"});
 let url=URL.createObjectURL(archivo);

 let a=document.createElement("a");
 a.href=url;
 a.download="backup.json";
 a.click();
}

// 🔥 IMPORTAR
function importar(e){
 let archivo=e.target.files[0];
 if(!archivo)return;

 let lector=new FileReader();

 lector.onload=function(ev){
  let datos=JSON.parse(ev.target.result);

  datos.forEach(p=>{
    p.id=p.id || Date.now()+Math.random();

    productos.push(p);

    if(online()){
      db.collection("productos").doc(p.id).set(p);
    }
  });

  guardarLocal();
  render();

  alert("Importado correctamente");
 };

 lector.readAsText(archivo);
}

// 🔥 EXPORTAR EXCEL
function exportarExcel(){

 let datos=productos.map(p=>({
   Nombre:p.nombre,
   Stock:p.stock,
   Costo:p.costo,
   Precio:p.precio,
   Tipo:p.tipo
 }));

 let hoja=XLSX.utils.json_to_sheet(datos);
 let libro=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(libro,hoja,"Productos");

 XLSX.writeFile(libro,"productos.xlsx");
}

// INICIO
render();

</script>
