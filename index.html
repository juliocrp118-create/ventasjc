<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VentasJC PRO</title>
<style>
body { font-family: Arial; padding: 20px; background:#f0f4f8; }
h2 { color:#0d6efd; }
.card { background:white; padding:12px; margin:10px 0; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
button { margin:3px; padding:6px 10px; border:none; border-radius:5px; cursor:pointer;}
.vender{ background:#28a745; color:white;}
.agregar{ background:#0d6efd; color:white;}
.restar{ background:#dc3545; color:white;}
input { margin:5px; padding:5px;}
</style>
</head>
<body>

<h2>VentasJC - Inventario PRO</h2>

<button onclick="cambiarUsuario()">Cambiar Usuario</button>
<p id="usuario"></p>

<h3>Agregar Producto</h3>
<input id="nombre" placeholder="Nombre">
<input id="stock" placeholder="Stock">
<input id="costo" placeholder="Costo">
<input id="precio" placeholder="Precio">
<button class="agregar" onclick="agregar()">Agregar</button>

<div id="productos"></div>

<h3>Ganancias</h3>
<div id="ganancias"></div>

<script>
let usuario = localStorage.getItem("usuario") || "Julio";
let productos = JSON.parse(localStorage.getItem("productos")) || [];
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];

function guardar(){
 localStorage.setItem("usuario", usuario);
 localStorage.setItem("productos", JSON.stringify(productos));
 localStorage.setItem("ventas", JSON.stringify(ventas));
}

function cambiarUsuario(){
 usuario = usuario==="Julio"?"Naysa":"Julio";
 guardar(); render();
}

function agregar(){
 let n=document.getElementById("nombre").value;
 let s=+document.getElementById("stock").value;
 let c=+document.getElementById("costo").value;
 let p=+document.getElementById("precio").value;
 if(!n)return alert("Nombre requerido");
 productos.push({nombre:n,stock:s,costo:c,precio:p});
 guardar(); render();
}

function vender(i){
 if(productos[i].stock<=0)return alert("Sin stock");
 productos[i].stock--;
 ventas.push({...productos[i]});
 guardar(); render();
}

function quitarStock(i){
 if(productos[i].stock<=0)return;
 productos[i].stock--;
 guardar(); render();
}

function render(){
 document.getElementById("usuario").innerText="Usuario: "+usuario;

 let html="";
 productos.forEach((p,i)=>{
  html+=`<div class='card'>
  <b>${p.nombre}</b><br>
  Stock:${p.stock}<br>
  Ganancia unidad:${p.precio-p.costo}<br>
  <button class='vender' onclick='vender(${i})'>Vender</button>
  <button class='restar' onclick='quitarStock(${i})'>Quitar Stock</button>
  </div>`;
 });
 document.getElementById("productos").innerHTML=html;

 let gananciaPotes=0, gananciaTinas=0;

 ventas.forEach(v=>{
  let g=v.precio-v.costo;
  if(v.nombre.toLowerCase().includes("pote")) gananciaPotes+=g;
  if(v.nombre.toLowerCase().includes("tina")) gananciaTinas+=g;
 });

 document.getElementById("ganancias").innerHTML=
  "Potes: "+gananciaPotes+" CUP<br>Tinas: "+gananciaTinas+" CUP";
}

render();
</script>

</body>
</html>
