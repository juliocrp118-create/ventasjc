<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VentasJC PRO</title>
<style>
body{font-family:Arial;margin:0;background:#1a1a1a;color:white}
.overlay{padding:20px}
input,button{margin:5px;padding:10px;border-radius:8px;border:none}
button{cursor:pointer;font-weight:bold}
.flex{display:flex;gap:20px}
.col{flex:1}
.card{background:white;color:black;padding:10px;margin:10px 0;border-radius:10px}
.box{background:white;color:black;padding:10px;border-radius:10px;width:200px}
.grid{display:flex;gap:10px;flex-wrap:wrap}
</style>
</head>
<body>

<div class="overlay">
<h2>VentasJC PRO</h2>

<input id="nombre" placeholder="Nombre">
<input id="stock" placeholder="Stock">
<input id="costo" placeholder="Costo">
<input id="precio" placeholder="Precio">
<button onclick="agregar()">Agregar</button>

<div class="flex">
<div class="col"><h3>Potes</h3><div id="potes"></div></div>
<div class="col"><h3>Tinas</h3><div id="tinas"></div></div>
</div>

<div class="grid">
<div class="box">Ganancias Potes: <span id="gP">0</span></div>
<div class="box">Ganancias Tinas: <span id="gT">0</span></div>
<div class="box">Ventas Potes: <span id="vP">0</span></div>
<div class="box">Ventas Tinas: <span id="vT">0</span></div>
<div class="box">Stock Potes: <span id="sP">0</span></div>
<div class="box">Stock Tinas: <span id="sT">0</span></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
 apiKey:"AIzaSyDgTmtl4VoF2UahIDZGVwQ11TuayHv2eHw",
 authDomain:"ventasjc-b1a1d.firebaseapp.com",
 projectId:"ventasjc-b1a1d"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let productos=[];
let gP=0,gT=0,vP=0,vT=0;

function agregar(){
 let c=+costo.value;
 let tipo=c===850?"pote":"tina";
 db.collection("productos").add({
  nombre:nombre.value,
  stock:+stock.value,
  costo:c,
  precio:+precio.value,
  tipo,
  fecha:firebase.firestore.FieldValue.serverTimestamp()
 });
}

// PRODUCTOS REALTIME
 db.collection("productos").onSnapshot(s=>{
 productos=[];
 s.forEach(doc=>{
  let d=doc.data();d.id=doc.id;
  productos.push(d);
 });
 render();
 });

// VENTAS REALTIME
 db.collection("ventas").onSnapshot(s=>{
 gP=gT=vP=vT=0;
 s.forEach(doc=>{
  let v=doc.data();
  if(v.tipo==="pote"){
   gP+=v.ganancia;
   vP++;
  }else{
   gT+=v.ganancia;
   vT++;
  }
 });
 render();
 });

function vender(id,i){
 let p=productos[i];
 if(p.stock<=0)return;

 db.collection("productos").doc(id).update({
  stock:p.stock-1
 });

 db.collection("ventas").add({
  tipo:p.tipo,
  ganancia:p.precio-p.costo,
  precio:p.precio,
  costo:p.costo,
  fecha:firebase.firestore.FieldValue.serverTimestamp()
 });
}

function render(){
 let pHTML="",tHTML="";
 let sP=0,sT=0;

 productos.forEach((p,i)=>{
  if(p.tipo==="pote") sP+=p.stock;
  else sT+=p.stock;

  let card=`<div class='card'>${p.nombre}<br>Stock:${p.stock}<br>
  <button onclick="vender('${p.id}',${i})">Vender</button></div>`;

  if(p.tipo==="pote") pHTML+=card;
  else tHTML+=card;
 });

 potes.innerHTML=pHTML;
 tinas.innerHTML=tHTML;

 gP.innerText=gP;
 gT.innerText=gT;
 vP.innerText=vP;
 vT.innerText=vT;
 sP.innerText=sP;
 sT.innerText=sT;
}
</script>

</body>
</html>
