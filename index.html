<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VentasJC ULTIMATE</title>
<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
.overlay { padding:20px; }
.hidden { display:none; }
button { margin:5px; padding:8px; border:none; border-radius:5px; cursor:pointer;}
.login { display:flex; justify-content:center; align-items:center; height:100vh; }
.box { background:white; padding:20px; border-radius:10px; text-align:center; }
.card { background:white; padding:10px; margin:10px 0; border-radius:10px; }
.grid { display:flex; gap:20px; flex-wrap:wrap; }
.box2 { background:white; padding:10px; border-radius:10px; flex:1; min-width:200px;}
canvas { background:white; border-radius:10px; margin-top:10px;}
</style>
</head>
<body>

<div id="loginDiv" class="login">
  <div class="box">
    <h2>Login VentasJC</h2>
    <input id="user" placeholder="Usuario"><br>
    <input id="pass" type="password" placeholder="Contraseña"><br>
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" class="hidden">
<div class="overlay">

<button onclick="logout()">Cerrar sesión</button>

<h2>VentasJC ULTIMATE</h2>

<input id="nombre" placeholder="Nombre">
<input id="stock" placeholder="Stock">
<input id="costo" placeholder="Costo">
<input id="precio" placeholder="Precio">
<button onclick="agregar()">Agregar</button>

<div id="productos"></div>

<div class="grid">
<div class="box2"><h3>Ganancia</h3><div id="ganancia"></div></div>
<div class="box2"><h3>Caja</h3><div id="caja"></div></div>
<div class="box2"><h3>Ventas hoy</h3><div id="hoy"></div></div>
<div class="box2"><h3>Ventas mes</h3><div id="mes"></div></div>
</div>

<h3>Ventas Potes / Tinas</h3>
<div id="conteo"></div>
<button onclick="reiniciar()">Reiniciar</button>

<h3>Gráfica</h3>
<canvas id="grafica" width="300" height="150"></canvas>

<button onclick="exportar()">Exportar Excel</button>

</div>
</div>

<script>
let productos = JSON.parse(localStorage.getItem("productos")) || [];
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];
let conteo = JSON.parse(localStorage.getItem("conteo")) || {potes:0,tinas:0};
let logged = localStorage.getItem("login")==="true";

if(logged){
 loginDiv.classList.add("hidden");
 app.classList.remove("hidden");
}

function login(){
 if(user.value==="Julio" && pass.value==="1234*"){
  localStorage.setItem("login","true");
  location.reload();
 } else alert("Error");
}

function logout(){
 localStorage.setItem("login","false");
 location.reload();
}

function guardar(){
 localStorage.setItem("productos",JSON.stringify(productos));
 localStorage.setItem("ventas",JSON.stringify(ventas));
 localStorage.setItem("conteo",JSON.stringify(conteo));
}

function agregar(){
 productos.push({nombre:nombre.value,stock:+stock.value,costo:+costo.value,precio:+precio.value});
 guardar();render();
}

function vender(i){
 if(productos[i].stock<=0) return;

 productos[i].stock--;

 let venta = {...productos[i], fecha:new Date().toISOString()};
 ventas.push(venta);

 if(productos[i].costo==850) conteo.potes++;
 if(productos[i].costo==2900) conteo.tinas++;

 guardar();render();
}

function reiniciar(){
 conteo={potes:0,tinas:0};
 ventas=[];
 guardar();render();
}

function render(){

 let html="";
 let ganancia=0;
 let caja=0;
 let hoy=0;
 let mes=0;

 let hoyStr = new Date().toDateString();
 let mesActual = new Date().getMonth();

 productos.forEach((p,i)=>{
 html+=`<div class='card'>
 ${p.nombre} Stock:${p.stock}
 <button onclick='vender(${i})'>Vender</button>
 </div>`;
 });

 ventas.forEach(v=>{
 let g=v.precio-v.costo;
 ganancia+=g;
 caja+=v.precio;

 let f=new Date(v.fecha);

 if(f.toDateString()==hoyStr) hoy++;
 if(f.getMonth()==mesActual) mes++;
 });

 productosDiv=document.getElementById("productos");
 productosDiv.innerHTML=html;

 document.getElementById("ganancia").innerText=ganancia;
 document.getElementById("caja").innerText=caja;
 document.getElementById("hoy").innerText=hoy;
 document.getElementById("mes").innerText=mes;

 document.getElementById("conteo").innerHTML=
 "Potes: "+conteo.potes+" | Tinas: "+conteo.tinas;

 dibujarGrafica(hoy);
}

function dibujarGrafica(valor){
 let ctx=document.getElementById("grafica").getContext("2d");
 ctx.clearRect(0,0,300,150);

 for(let i=0;i<valor;i++){
  ctx.fillRect(i*10,140,8,-20);
 }
}

function exportar(){
 let csv="Producto,Precio,Costo,Fecha\n";
 ventas.forEach(v=>{
  csv+=`${v.nombre},${v.precio},${v.costo},${v.fecha}\n`;
 });

 let blob=new Blob([csv]);
 let link=document.createElement("a");
 link.href=URL.createObjectURL(blob);
 link.download="ventas.csv";
 link.click();
}

render();
</script>

</body>
</html>
