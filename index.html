<script>

function render(){

 let pHTML="",tHTML="";
 let invP=0,invT=0,dispP=0,dispT=0;

 let gP=0,gT=0,rP=0,rT=0,hP=0,hT=0;

 // 🔥 NUEVO (SOLO ESTO)
 let ventasP=0, ventasT=0;

 productos.forEach((p,i)=>{

  let inv=p.inventario||0;
  let v=p.ventas||0;

  // 🔥 SUMA REAL DE VENTAS (DESDE FIREBASE)
  if(p.tipo==="pote") ventasP += v;
  else ventasT += v;

  if(p.tipo==="pote"){
   invP+=inv*p.costo;
   dispP+=p.stock;
  }else{
   invT+=inv*p.costo;
   dispT+=p.stock;
  }

  let gan=(p.precio-p.costo)*v;

  if(p.tipo==="pote"){
   gP+=gan; rP+=v*p.costo; hP+=v*p.precio;
  }else{
   gT+=gan; rT+=v*p.costo; hT+=v*p.precio;
  }

  let color = p.stock==0?"red":p.stock<=3?"orange":"black";
  let icono = obtenerIcono(p.nombre);

  let card=`
  <div class='card'>
  <b>${icono} ${p.nombre}</b>

  <div class="info-row">
    <div class="info-box"><span>🧾 Inventario</span><b>${inv}</b></div>
    <div class="info-box"><span>📦 Disponibles</span><b style="color:${color}">${p.stock}</b></div>
    <div class="info-box"><span>📊 Ventas</span><b>${v}</b></div>
  </div>

  <br>

  <button onclick="vender('${p.id}',${i})">Vender</button>
  <button onclick="editar('${p.id}',${i})">Editar</button>
  <button onclick="eliminar('${p.id}')">Eliminar</button>
  </div>`;

  if(p.tipo==="pote") pHTML+=card;
  else tHTML+=card;
 });

 potes.innerHTML=pHTML;
 tinas.innerHTML=tHTML;

 gananciasPotes.innerText=gP;
 gananciasTinas.innerText=gT;

 inversionPotes.innerText=invP;
 inversionTinas.innerText=invT;

 reinvertirPotes.innerText=rP;
 reinvertirTinas.innerText=rT;

 hoyPotes.innerText=hP;
 hoyTinas.innerText=hT;

 // 🔥 AQUÍ EL CAMBIO IMPORTANTE
 ventasPotes.innerText = ventasP;
 ventasTinas.innerText = ventasT;

 dispPotes.innerText=dispP;
 dispTinas.innerText=dispT;
}

</script>
