<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VentasJC</title>

<!-- 🔥 ICONO EN PESTAÑA -->
<link rel="icon" type="image/png" href="icono.png">

<style>
body{
  font-family: Arial;
  margin:0;
  background: url('fondo.jpg') no-repeat center center fixed;
  background-size: cover;
}
.overlay{
  background:rgba(0,0,0,0.45);
  min-height:100vh;
  padding:20px;
  color:white;
}
#loginDiv{display:flex;justify-content:center;align-items:center}
.login-box{
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:15px;
  text-align:center;
}
input{margin:5px;padding:10px;border-radius:8px;border:none}
button{padding:10px;margin:5px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.agregar{background:#00c853;color:white}
.logout{background:#ff5252;color:white;float:right}
.flex{display:flex;gap:20px}
.col{flex:1}
.card{background:white;color:black;padding:15px;margin:10px 0;border-radius:12px}
.grid{display:flex;gap:20px;margin-top:20px;flex-wrap:wrap;justify-content:center}
.box{background:white;color:black;padding:15px;border-radius:12px;width:220px;text-align:center;font-weight:bold}
.center{text-align:center;margin-top:20px}
.logo{
  text-align:center;
  margin-bottom:10px;
}
</style>
</head>
<body>

<div id="loginDiv" class="overlay">
  <div class="login-box">
    <h2>Login VentasJC</h2>
    <input id="user" placeholder="Usuario"><br>
    <input id="pass" type="password" placeholder="Contraseña"><br>
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" class="overlay" style="display:none;">
<button class="logout" onclick="logout()">Cerrar sesión</button>

<!-- 🔥 LOGO -->
<div class="logo">
  <img src="logo.png" style="height:70px;">
</div>

<input id="nombre" placeholder="Nombre">
<input id="stock" placeholder="Stock">
<input id="costo" placeholder="Costo (850 o 2900)">
<input id="precio" placeholder="Precio">
<button class="agregar" onclick="agregar()">Agregar</button>

<div class="flex">
<div class="col"><h3>Potes 1L</h3><div id="potes"></div></div>
<div class="col"><h3>Tinas 4L</h3><div id="tinas"></div></div>
</div>

<div class="grid">

  <div class="box">
    💰 Ganancias<br><br>
    Potes: <span id="gananciasPotes">0</span><br>
    Tinas: <span id="gananciasTinas">0</span>
  </div>

  <div class="box">
    📦 Inversión<br><br>
    Potes: <span id="inversionPotes">0</span><br>
    Tinas: <span id="inversionTinas">0</span>
  </div>

  <div class="box">
    🔄 Reinvertir<br><br>
    Potes: <span id="reinvertirPotes">0</span><br>
    Tinas: <span id="reinvertirTinas">0</span>
  </div>

  <div class="box">
    💵 Hoy<br><br>
    Potes: <span id="hoyPotes">0</span><br>
    Tinas: <span id="hoyTinas">0</span>
  </div>

  <div class="box">
    📦 Total Stock<br><br>
    Potes: <span id="stockPotes">0</span><br>
    Tinas: <span id="stockTinas">0</span>
  </div>

</div>

<div class="center">
<h3>Ventas</h3>
<p id="conteoTexto"></p>
<button onclick="reiniciar()">Reiniciar</button>

<br><br>

<button onclick="exportar()">📤 Exportar JSON</button>
<input type="file" onchange="importar(event)">

<br><br>

<button onclick="exportarExcel()">📊 Exportar Excel</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
const firebaseConfig = {
 apiKey: "AIzaSy...",
 authDomain: "ventasjc-b1a1d.firebaseapp.com",
 projectId: "ventasjc-b1a1d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let productos=[];
let conteoData={potes:0,tinas:0};
let gPotes=0, gTinas=0;
let rPotes=0, rTinas=0;
let hPotes=0, hTinas=0;

// 🔥 LOCAL STORAGE
function guardarDatos(){
 localStorage.setItem("ventasDatos", JSON.stringify({
  gPotes,gTinas,rPotes,rTinas,hPotes,hTinas,conteoData
 }));
}

function cargarDatos(){
 let d = localStorage.getItem("ventasDatos");
 if(d){
  let data = JSON.parse(d);
  gPotes = data.gPotes || 0;
  gTinas = data.gTinas || 0;
  rPotes = data.rPotes || 0;
  rTinas = data.rTinas || 0;
  hPotes = data.hPotes || 0;
  hTinas = data.hTinas || 0;
  conteoData = data.conteoData || {potes:0,tinas:0};
 }
}

cargarDatos();

function login(){
 if(user.value==="Julio" && pass.value==="1234*"){
  loginDiv.style.display="none";
  app.style.display="block";
 }else{
  alert("Datos incorrectos");
 }
}

function logout(){
 app.style.display="none";
 loginDiv.style.display="flex";
}

function agregar(){
 let c = +costo.value;
 let tipo = c===850?"pote":c===2900?"tina":"";
 if(!tipo) return alert("Costo inválido");

 db.collection("productos").add({
  nombre:nombre.value,
  stock:+stock.value,
  costo:c,
  precio:+precio.value,
  tipo,
  fecha: firebase.firestore.FieldValue.serverTimestamp()
 });
}

db.collection("productos").orderBy("fecha","asc").onSnapshot(s=>{
 productos=[];
 s.forEach(doc=>{
  let d=doc.data(); d.id=doc.id;
  productos.push(d);
 });
 render();
});

function vender(id,i){
 let p=productos[i];
 if(p.stock<=0)return;

 db.collection("productos").doc(id).update({stock:p.stock-1});

 let g=p.precio-p.costo;

 if(p.tipo==="pote"){
  gPotes+=g; rPotes+=p.costo; hPotes+=p.precio; conteoData.potes++;
 }else{
  gTinas+=g; rTinas+=p.costo; hTinas+=p.precio; conteoData.tinas++;
 }

 guardarDatos();
 render();
}

function reiniciar(){
 conteoData={potes:0,tinas:0};
 gPotes=gTinas=0;
 rPotes=rTinas=0;
 hPotes=hTinas=0;
 localStorage.removeItem("ventasDatos");
 render();
}

function render(){
 let pHTML="",tHTML="";
 let invP=0,invT=0,stockP=0,stockT=0;

 productos.forEach((p,i)=>{
   if(p.tipo==="pote"){
     invP+=p.stock*p.costo;
     stockP+=p.stock;
   }else{
     invT+=p.stock*p.costo;
     stockT+=p.stock;
   }

   let card=`<div class='card'>
   ${p.nombre}<br>Stock:${p.stock}<br>
   <button onclick="vender('${p.id}',${i})">Vender</button>
   </div>`;

   if(p.tipo==="pote") pHTML+=card;
   else tHTML+=card;
 });

 potes.innerHTML=pHTML;
 tinas.innerHTML=tHTML;

 gananciasPotes.innerText=gPotes;
 gananciasTinas.innerText=gTinas;

 inversionPotes.innerText=invP;
 inversionTinas.innerText=invT;

 reinvertirPotes.innerText=rPotes;
 reinvertirTinas.innerText=rTinas;

 hoyPotes.innerText=hPotes;
 hoyTinas.innerText=hTinas;

 stockPotes.innerText=stockP;
 stockTinas.innerText=stockT;

 conteoTexto.innerText=`Potes:${conteoData.potes} | Tinas:${conteoData.tinas}`;
}
</script>

</body>
</html>
