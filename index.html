<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VentasJC PRO FINAL</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: url('fondo.jpg') no-repeat center center fixed;
  background-size: cover;
}

.overlay{
  background:rgba(0,0,0,0.45);
  min-height:100vh;
  padding:20px;
  color:white;
}

#loginDiv{display:flex;justify-content:center;align-items:center}

.login-box{
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:15px;
  text-align:center;
}

input{margin:5px;padding:10px;border-radius:8px;border:none}
button{padding:10px;margin:5px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.agregar{background:#00c853;color:white}
.logout{background:#ff5252;color:white;float:right}

.flex{display:flex;gap:20px}
.col{flex:1}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.info-row{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  text-align:center;
}

.info-box{
  flex:1;
}

.info-box span{
  font-size:12px;
  color:gray;
}

.info-box b{
  display:block;
  font-size:16px;
  margin-top:3px;
}

.grid{
  display:flex;
  gap:20px;
  margin-top:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.box{
  background:white;
  color:black;
  padding:15px;
  border-radius:12px;
  width:220px;
  text-align:center;
  font-weight:bold;
}

.center{text-align:center;margin-top:20px}
</style>
</head>

<body>

<div id="loginDiv" class="overlay">
  <div class="login-box">
    <h2>Login VentasJC</h2>
    <input id="user" placeholder="Usuario"><br>
    <input id="pass" type="password" placeholder="Contraseña"><br>
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" class="overlay" style="display:none;">

<button class="logout" onclick="logout()">Cerrar sesión</button>

<h2>VentasJC PRO</h2>

<input id="nombre" placeholder="Nombre">
<input id="stock" placeholder="Inventario">
<input id="costo" placeholder="Costo (850 o 2900)">
<input id="precio" placeholder="Precio">
<button class="agregar" onclick="agregar()">Agregar</button>

<div class="flex">
<div class="col"><h3>Potes 1L</h3><div id="potes"></div></div>
<div class="col"><h3>Tinas 4L</h3><div id="tinas"></div></div>
</div>

<div class="grid">
  <div class="box">💰 Ganancias<br>Potes: <span id="gananciasPotes">0</span><br>Tinas: <span id="gananciasTinas">0</span></div>
  <div class="box">📦 Inversión<br>Potes: <span id="inversionPotes">0</span><br>Tinas: <span id="inversionTinas">0</span></div>
  <div class="box">🔄 Reinvertir<br>Potes: <span id="reinvertirPotes">0</span><br>Tinas: <span id="reinvertirTinas">0</span></div>
  <div class="box">💵 Hoy<br>Potes: <span id="hoyPotes">0</span><br>Tinas: <span id="hoyTinas">0</span></div>
</div>

<div class="center">
<h3>Ventas</h3>
<p id="conteoTexto"></p>
<button onclick="reiniciar()">Reiniciar</button>

<br><br>

<button onclick="exportar()">📤 Exportar JSON</button>
<input type="file" onchange="importar(event)">

<br><br>

<button onclick="exportarExcel()">📊 Exportar Excel</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyDgTmtl4VoF2UahIDZGVwQ11TuayHv2eHw",
 authDomain: "ventasjc-b1a1d.firebaseapp.com",
 projectId: "ventasjc-b1a1d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let productos=[];
let conteoData={potes:0,tinas:0};

function login(){
 let u=user.value.trim();
 let p=pass.value.trim();
 if(u==="Julio" && p==="1234*"){
  loginDiv.style.display="none";
  app.style.display="block";
 }else{
  alert("Datos incorrectos");
 }
}

function logout(){
 app.style.display="none";
 loginDiv.style.display="flex";
}

function agregar(){
 let c = +costo.value;
 let tipo = "";

 if(c === 850) tipo="pote";
 else if(c === 2900) tipo="tina";
 else return alert("Costo inválido");

 let cantidad = +stock.value;

 db.collection("productos").add({
  nombre:nombre.value,
  stock:cantidad,
  inventario:cantidad,
  ventas:0,
  costo:c,
  precio:+precio.value,
  tipo:tipo,
  fecha: firebase.firestore.FieldValue.serverTimestamp()
 });
}

db.collection("productos").orderBy("fecha","asc")
.onSnapshot(snapshot=>{
 productos=[];
 snapshot.forEach(doc=>{
  let d=doc.data(); d.id=doc.id;
  productos.push(d);
 });
 render();
});

function vender(id,i){
 let p=productos[i];
 if(p.stock<=0)return;

 db.collection("productos").doc(id).update({
  stock:p.stock-1,
  ventas:(p.ventas||0)+1
 });

 if(p.tipo==="pote") conteoData.potes++;
 else conteoData.tinas++;
}

function editar(id,i){
 let p=productos[i];

 let inv = prompt("Inventario:", p.inventario||0);
 let disp = prompt("Disponibles:", p.stock||0);
 let ven = prompt("Ventas:", p.ventas||0);

 if(inv!=null && disp!=null && ven!=null){
  db.collection("productos").doc(id).update({
   inventario:+inv,
   stock:+disp,
   ventas:+ven
  });
 }
}

function eliminar(id){
 db.collection("productos").doc(id).delete();
}

// 🔥 REINICIAR REAL
function reiniciar(){

 if(!confirm("¿Seguro que quieres reiniciar todo?")) return;

 db.collection("productos").get().then(snapshot=>{
   snapshot.forEach(doc=>{
     db.collection("productos").doc(doc.id).update({
       ventas:0
     });
   });
 });

 conteoData={potes:0,tinas:0};
}

// EXPORTAR JSON
function exportar(){
 db.collection("productos").get().then(snapshot=>{
  let datos=[];
  snapshot.forEach(doc=>datos.push(doc.data()));
  let archivo=new Blob([JSON.stringify(datos,null,2)]);
  let url=URL.createObjectURL(archivo);
  let a=document.createElement("a");
  a.href=url;
  a.download="productos.json";
  a.click();
 });
}

// IMPORTAR
function importar(e){
 let archivo=e.target.files[0];
 let lector=new FileReader();
 lector.onload=function(ev){
  let datos=JSON.parse(ev.target.result);
  datos.forEach(p=>db.collection("productos").add(p));
 };
 lector.readAsText(archivo);
}

// EXCEL
function exportarExcel(){
 db.collection("productos").get().then(snapshot=>{
  let datos=[];
  snapshot.forEach(doc=>{
    let p=doc.data();
    datos.push({
      Nombre:p.nombre,
      Inventario:p.inventario,
      Disponibles:p.stock,
      Ventas:p.ventas,
      Costo:p.costo,
      Precio:p.precio
    });
  });
  let hoja=XLSX.utils.json_to_sheet(datos);
  let libro=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(libro,hoja,"Productos");
  XLSX.writeFile(libro,"productos.xlsx");
 });
}

// RENDER
function render(){

 let pHTML="",tHTML="";
 let invP=0,invT=0;

 let gPotes=0,gTinas=0;
 let rPotes=0,rTinas=0;
 let hPotes=0,hTinas=0;

 productos.forEach((p,i)=>{

   let inventario = p.inventario ?? p.stock ?? 0;
   let ventas = p.ventas || 0;

   if(p.tipo==="pote") invP+= inventario*p.costo;
   else invT+= inventario*p.costo;

   let ganancia = (p.precio - p.costo) * ventas;

   if(p.tipo==="pote"){
     gPotes += ganancia;
     rPotes += ventas * p.costo;
     hPotes += ventas * p.precio;
   }else{
     gTinas += ganancia;
     rTinas += ventas * p.costo;
     hTinas += ventas * p.precio;
   }

   let colorStock = p.stock <= 2 ? "red" : "black";

   let card=`
   <div class='card'>
   <b>${p.nombre}</b>

   <div class="info-row">
     <div class="info-box">
       <span>🧾 Inventario</span>
       <b>${inventario}</b>
     </div>

     <div class="info-box">
       <span>📦 Disponibles</span>
       <b style="color:${colorStock}">${p.stock}</b>
     </div>

     <div class="info-box">
       <span>📊 Ventas</span>
       <b>${ventas}</b>
     </div>
   </div>

   <br>

   <button onclick="vender('${p.id}',${i})">Vender</button>
   <button onclick="editar('${p.id}',${i})">Editar</button>
   <button onclick="eliminar('${p.id}')">Eliminar</button>
   </div>`;

   if(p.tipo==="pote") pHTML+=card;
   else tHTML+=card;
 });

 potes.innerHTML=pHTML;
 tinas.innerHTML=tHTML;

 conteoTexto.innerHTML=`Potes:${conteoData.potes} | Tinas:${conteoData.tinas}`;

 gananciasPotes.innerText=gPotes;
 gananciasTinas.innerText=gTinas;

 inversionPotes.innerText=invP;
 inversionTinas.innerText=invT;

 reinvertirPotes.innerText=rPotes;
 reinvertirTinas.innerText=rTinas;

 hoyPotes.innerText=hPotes;
 hoyTinas.innerText=hTinas;
}

</script>

</body>
</html>
