<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VentasJC</title>
<style>
/* 🔥 DISEÑO ORIGINAL RESTAURADO */
body{
  font-family: Arial;
  margin:0;
  background-image: url('data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEAYABgAAD');
  background-size:cover;
}
.hidden{display:none}
.overlay{background:rgba(0,0,0,0.6);min-height:100vh;padding:20px;color:white}
input{margin:5px;padding:8px;border-radius:5px;border:none}
button{padding:8px 12px;margin:5px;border:none;border-radius:5px;cursor:pointer}
.agregar{background:#0d6efd;color:white}
.logout{background:#6c757d;color:white;float:right}
.flex{display:flex;gap:20px}
.col{flex:1}
.card{background:white;color:black;padding:10px;margin:10px 0;border-radius:10px}
.center{text-align:center;margin-top:20px}
.table{background:white;color:black;padding:10px;border-radius:10px;display:inline-block}
</style>
</head>
<body>

<div id="loginDiv" class="overlay">
  <h2>Login VentasJC</h2>
  <input id="user" placeholder="Usuario"><br>
  <input id="pass" type="password" placeholder="Contraseña"><br>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" class="overlay" style="display:none;">
<button class="logout" onclick="logout()">Cerrar sesión</button>

<h2>VentasJC</h2>

<input id="nombre" placeholder="Nombre">
<input id="stock" placeholder="Stock">
<input id="costo" placeholder="Costo">
<input id="precio" placeholder="Precio">
<button class="agregar" onclick="agregar()">Agregar</button>

<div class="flex">
<div class="col"><h3>Potes</h3><div id="potes"></div></div>
<div class="col"><h3>Tinas</h3><div id="tinas"></div></div>
</div>

<div class="center">
  <div class="table">
    <h3>Ventas</h3>
    <p id="conteoTexto"></p>
  </div>
  <br>
  <button onclick="reiniciar()">Reiniciar Conteo</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgTmtl4VoF2UahIDZGVwQ11TuayHv2eHw",
  authDomain: "ventasjc-b1a1d.firebaseapp.com",
  projectId: "ventasjc-b1a1d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let productos = [];
let conteoData = {potes:0,tinas:0};

// 🔥 LOGIN ARREGLADO
function login(){

 let usuario = document.getElementById("user").value.trim();
 let clave = document.getElementById("pass").value.trim();

 console.log("Usuario:", usuario);
 console.log("Clave:", clave);

 if(usuario === "Julio" && clave === "1234*"){
   document.getElementById("loginDiv").style.display = "none";
   document.getElementById("app").style.display = "block";
 } else {
   alert("Usuario o contraseña incorrecta");
 }

}
}

function logout(){
 document.getElementById("app").classList.add("hidden");
 document.getElementById("loginDiv").classList.remove("hidden");
}

function agregar(){
 let nuevo = {
   nombre:nombre.value,
   stock:+stock.value,
   costo:+costo.value,
   precio:+precio.value,
   tipo:(+costo.value)==850?"pote":"tina"
 };

 db.collection("productos").add(nuevo);
}

// 🔥 TIEMPO REAL
db.collection("productos").onSnapshot(snapshot=>{
 productos=[];
 snapshot.forEach(doc=>{
   let data=doc.data();
   data.id=doc.id;
   productos.push(data);
 });
 render();
});

function vender(id,i){
 if(productos[i].stock<=0)return;
 let nuevoStock = productos[i].stock-1;
 if(productos[i].tipo=="pote") conteoData.potes++;
 else conteoData.tinas++;
 db.collection("productos").doc(id).update({stock:nuevoStock});
}

function eliminar(id){
 db.collection("productos").doc(id).delete();
}

function reiniciar(){
 conteoData={potes:0,tinas:0};
 render();
}

function render(){
 let pHTML="",tHTML="";
 productos.forEach((p,i)=>{
 let card=`<div class='card'>
 ${p.nombre}<br>
 Stock:${p.stock}<br>
 <button onclick="vender('${p.id}',${i})">Vender</button>
 <button onclick="eliminar('${p.id}')">Eliminar</button>
 </div>`;
 if(p.tipo==="pote") pHTML+=card;
 else tHTML+=card;
 });
 potes.innerHTML=pHTML;
 tinas.innerHTML=tHTML;
 conteoTexto.innerHTML="Potes vendidos: "+conteoData.potes+"<br>Tinas vendidos: "+conteoData.tinas;
}
</script>

</body>
</html>
