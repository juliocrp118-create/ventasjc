.container { padding:20px; }
.flex { display:flex; gap:20px; }
.col { flex:1; }
.card { background:white; padding:12px; margin:10px 0; border-radius:10px; }
button { margin:3px; padding:6px 10px; border:none; border-radius:5px; }
.vender{ background:#28a745; color:white;}
.editar{ background:#ffc107; }
.eliminar{ background:#dc3545; color:white;}
.agregar{ background:#0d6efd; color:white;}
.grid { display:flex; gap:20px; margin-top:20px;}
.box { background:white; padding:10px; border-radius:10px; flex:1;}
.center { text-align:center; margin-top:20px;}
</style>
</head>
<body>

<div class="banner"></div>

<div class="container">
<p><b>Usuario:</b> Julio</p>

<h3>Agregar Producto</h3>
<input id="nombre" placeholder="Nombre">
<input id="stock" placeholder="Stock">
<input id="costo" placeholder="Costo">
<input id="precio" placeholder="Precio">
<button class="agregar" onclick="agregar()">Agregar</button>

<div class="flex">
<div class="col"><h3>Potes 1L</h3><div id="potes"></div></div>
<div class="col"><h3>Tinas 4L</h3><div id="tinas"></div></div>
</div>

<div class="grid">
<div class="box"><h3>Ganancias</h3><div id="ganancias"></div></div>
<div class="box"><h3>Inversión</h3><div id="inversion"></div></div>
<div class="box"><h3>Dinero para Invertir</h3><div id="reinvertir"></div></div>
</div>

<div class="center">
<h3>Ventas por tipo</h3>
<div id="conteo"></div>
<button onclick="reiniciar()">Reiniciar Conteo</button>
</div>

<script>
let productos = JSON.parse(localStorage.getItem("productos")) || [];
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];
let conteo = JSON.parse(localStorage.getItem("conteo")) || {potes:0, tinas:0};

function guardar(){
 localStorage.setItem("productos", JSON.stringify(productos));
 localStorage.setItem("ventas", JSON.stringify(ventas));
 localStorage.setItem("conteo", JSON.stringify(conteo));
}

function agregar(){
 let n=nombre.value, s=+stock.value, c=+costo.value, p=+precio.value;
 if(!n)return alert("Nombre requerido");
 productos.push({nombre:n,stock:s,costo:c,precio:p});
 guardar(); render();
}

function vender(i){
 if(productos[i].stock<=0)return alert("Sin stock");
 productos[i].stock--;
 ventas.push(productos[i]);
 if(productos[i].costo==850) conteo.potes++;
 if(productos[i].costo==2900) conteo.tinas++;
 guardar(); render();
}

function editarStock(i){
 let nuevo = prompt("Nuevo stock:", productos[i].stock);
 if(nuevo!==null){ productos[i].stock=Number(nuevo); guardar(); render(); }
}

function eliminar(i){
 if(confirm("Eliminar producto?")){ productos.splice(i,1); guardar(); render(); }
}

function reiniciar(){
 if(confirm("Reiniciar conteo?")){
  conteo={potes:0,tinas:0};
  ventas=[];
  guardar(); render();
 }
}

function render(){
 let potesHTML="", tinasHTML="";
 let gp=0, gt=0, ip=0, it=0, rp=0, rt=0;

 productos.forEach((p,i)=>{
  let card=`<div class='card'>
  <b>${p.nombre}</b><br>
  Stock:${p.stock}<br>
  Ganancia:${p.precio-p.costo}<br>
  <button class='vender' onclick='vender(${i})'>Vender</button>
  <button class='editar' onclick='editarStock(${i})'>Editar</button>
  <button class='eliminar' onclick='eliminar(${i})'>Eliminar</button>
  </div>`;

  if(p.costo==850){ potesHTML+=card; ip+=p.stock*p.costo; }
  if(p.costo==2900){ tinasHTML+=card; it+=p.stock*p.costo; }
 });

 ventas.forEach(v=>{
  let g=v.precio-v.costo;
  if(v.costo==850){ gp+=g; rp+=v.costo; }
  if(v.costo==2900){ gt+=g; rt+=v.costo; }
 });

 potes.innerHTML=potesHTML;
 tinas.innerHTML=tinasHTML;

 ganancias.innerHTML=`Potes: ${gp} CUP<br>Tinas: ${gt} CUP`;
 inversion.innerHTML=`Potes: ${ip} CUP<br>Tinas: ${it} CUP`;
 reinvertir.innerHTML=`Potes: ${rp} CUP<br>Tinas: ${rt} CUP`;
 conteo.innerHTML=`Potes: ${conteo.potes}<br>Tinas: ${conteo.tinas}`;
}

render();
</script>

</div>
</body>
</html>
