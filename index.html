<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VentasJC FUNCIONAL</title>
<style>
body {font-family: Arial; background:#eef2f7; margin:0;}
.container {padding:20px;}
.hidden{display:none;}
.card{background:white;padding:10px;margin:10px 0;border-radius:10px;}
button{margin:5px;padding:8px;border:none;border-radius:5px;}
</style>
</head>
<body>

<div id="login">
  <div class="container">
    <h2>Login</h2>
    <input id="user" placeholder="Usuario"><br>
    <input id="pass" type="password" placeholder="Contraseña"><br>
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" class="hidden">
<div class="container">

<button onclick="logout()">Cerrar sesión</button>

<h2>VentasJC</h2>

<input id="nombre" placeholder="Nombre">
<input id="stock" placeholder="Stock">
<input id="costo" placeholder="Costo">
<input id="precio" placeholder="Precio">
<button onclick="agregar()">Agregar</button>

<div id="productos"></div>

<h3>Ventas</h3>
<div id="conteo"></div>

<h3>Caja</h3>
<div id="caja"></div>

<button onclick="exportar()">Exportar</button>

</div>
</div>

<script>

let productos = JSON.parse(localStorage.getItem("productos")) || [];
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];
let conteo = JSON.parse(localStorage.getItem("conteo")) || {potes:0,tinas:0};

if(localStorage.getItem("login")==="true"){
 document.getElementById("login").classList.add("hidden");
 document.getElementById("app").classList.remove("hidden");
}

function login(){
 if(user.value==="Julio" && pass.value==="1234*"){
  localStorage.setItem("login","true");
  location.reload();
 } else alert("Error");
}

function logout(){
 localStorage.setItem("login","false");
 location.reload();
}

function guardar(){
 localStorage.setItem("productos",JSON.stringify(productos));
 localStorage.setItem("ventas",JSON.stringify(ventas));
 localStorage.setItem("conteo",JSON.stringify(conteo));
}

function agregar(){
 productos.push({nombre:nombre.value,stock:+stock.value,costo:+costo.value,precio:+precio.value});
 guardar(); render();
}

function vender(i){
 if(productos[i].stock<=0)return;

 productos[i].stock--;

 if(productos[i].costo==850) conteo.potes++;
 if(productos[i].costo==2900) conteo.tinas++;

 ventas.push(productos[i]);

 guardar(); render();
}

function render(){

 let html="";
 let caja=0;

 productos.forEach((p,i)=>{
 html+=`<div class='card'>
 ${p.nombre} Stock:${p.stock}
 <button onclick='vender(${i})'>Vender</button>
 </div>`;
 });

 ventas.forEach(v=>{
 caja+=v.precio;
 });

 document.getElementById("productos").innerHTML=html;
 document.getElementById("conteo").innerHTML=
 "Potes: "+conteo.potes+" | Tinas: "+conteo.tinas;

 document.getElementById("caja").innerText=caja+" CUP";
}

function exportar(){
 let csv="Producto,Precio,Costo\n";
 ventas.forEach(v=>{
  csv+=`${v.nombre},${v.precio},${v.costo}\n`;
 });

 let blob=new Blob([csv]);
 let link=document.createElement("a");
 link.href=URL.createObjectURL(blob);
 link.download="ventas.csv";
 link.click();
}

render();

</script>

</body>
</html>
