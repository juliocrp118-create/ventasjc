<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VentasJC</title>
<style>
body {font-family: Arial;margin:0;background:#eef2f7;}
.login{display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:white;padding:20px;border-radius:10px;text-align:center;}
input{margin:5px;padding:8px;}
button{padding:8px 12px;background:#0d6efd;color:white;border:none;border-radius:5px;}
.hidden{display:none;}
.app{padding:20px;}
</style>
</head>
<body>

<div id="loginDiv" class="login">
  <div class="box">
    <h2>VentasJC Login</h2>
    <input id="user" placeholder="Usuario"><br>
    <input id="pass" type="password" placeholder="Contraseña"><br>
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" class="app hidden">
  <h2>Bienvenido Julio</h2>
  <p>Login correcto ✔</p>
</div>

<script>
function login(){
 let u=document.getElementById("user").value;
 let p=document.getElementById("pass").value;

 if(u==="Julio" && p==="1234*"){
  document.getElementById("loginDiv").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
 } else {
  alert("Usuario o contraseña incorrectos");
 }
}
</script>

</body>
</html>
