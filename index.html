<body>

<div id="loginDiv" class="login">
  <div class="box">
    <h2>Login VentasJC</h2>
    <input id="user" placeholder="Usuario"><br>
    <input id="pass" type="password" placeholder="Contraseña"><br>
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" class="hidden">
<div class="overlay">

<button class="logout" onclick="logout()">Cerrar sesión</button>

<h2>VentasJC</h2>

<input id="nombre" placeholder="Nombre">
<input id="stock" placeholder="Stock">
<input id="costo" placeholder="Costo">
<input id="precio" placeholder="Precio">
<button class="agregar" onclick="agregar()">Agregar</button>

<div class="flex">
<div class="col"><h3>Potes</h3><div id="potes"></div></div>
<div class="col"><h3>Tinas</h3><div id="tinas"></div></div>
</div>

<div class="grid">
<div class="box2"><h3>Ganancias</h3><div id="ganancias"></div></div>
<div class="box2"><h3>Inversión</h3><div id="inversion"></div></div>
<div class="box2"><h3>Reinvertir</h3><div id="reinvertir"></div></div>
</div>

<div class="center">
  <div class="table">
    <h3>Ventas</h3>
    <p id="conteoTexto"></p>
  </div>
  <br>
  <button onclick="reiniciar()">Reiniciar Conteo</button>
</div>

</div>
</div>

<script>
let productos = JSON.parse(localStorage.getItem("productos")) || [];
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];
let conteoData = JSON.parse(localStorage.getItem("conteo")) || {potes:0,tinas:0};

function login(){
 if(user.value==="Julio" && pass.value==="1234*"){
  loginDiv.classList.add("hidden");
  app.classList.remove("hidden");
 } else alert("Error");
}

function logout(){
 app.classList.add("hidden");
 loginDiv.classList.remove("hidden");
}

function guardarProducto(producto){

  db.collection("productos").add({
    nombre: producto.nombre,
    precio: producto.precio,
    costo: producto.costo,
    stock: producto.stock,
    tipo: producto.tipo
  });

}

function agregar(){
 productos.push({nombre:nombre.value,stock:+stock.value,costo:+costo.value,precio:+precio.value});
 guardar();render();
}

function vender(i){
 if(productos[i].stock<=0)return;

 productos[i].stock--;

 if(productos[i].costo==850) conteoData.potes++;
 if(productos[i].costo==2900) conteoData.tinas++;

 ventas.push({...productos[i]});
 guardar();
 render();
}

function editar(i){
 let n=prompt("Stock:",productos[i].stock);
 if(n!==null)productos[i].stock=+n;
 guardar();render();
}

function eliminar(i){
 if(confirm("Eliminar?"))productos.splice(i,1);
 guardar();render();
}

function reiniciar(){
 conteoData={potes:0,tinas:0};
 ventas=[];
 guardar();
 render();
}

function render(){
 let pHTML="",tHTML="";
 let gp=0,gt=0,ip=0,it=0,rp=0,rt=0;

 productos.forEach((p,i)=>{
 let card=`<div class='card'>
 ${p.nombre}<br>Stock:${p.stock}<br>
 <button class='vender' onclick='vender(${i})'>Vender</button>
 <button class='editar' onclick='editar(${i})'>Editar</button>
 <button class='eliminar' onclick='eliminar(${i})'>Eliminar</button>
 </div>`;
 if(p.costo==850){pHTML+=card;ip+=p.stock*p.costo;}
 if(p.costo==2900){tHTML+=card;it+=p.stock*p.costo;}
 });

 ventas.forEach(v=>{
 let g=v.precio-v.costo;
 if(v.costo==850){gp+=g;rp+=v.costo;}
 if(v.costo==2900){gt+=g;rt+=v.costo;}
 });

 potes.innerHTML=pHTML;
 tinas.innerHTML=tHTML;
 ganancias.innerHTML=`Potes:${gp}<br>Tinas:${gt}`;
 inversion.innerHTML=`Potes:${ip}<br>Tinas:${it}`;
 reinvertir.innerHTML=`Potes:${rp}<br>Tinas:${rt}`;

 document.getElementById("conteoTexto").innerHTML =
   "Potes vendidos: " + conteoData.potes + "<br>Tinas vendidas: " + conteoData.tinas;
}

render();

// === NUEVAS FUNCIONES SIN ROMPER NADA ===

// recordar sesión (ya usa login existente)

// ventas por fecha
function obtenerHoy(){
 return new Date().toDateString();
}

function ventasHoy(){
 return ventas.filter(v=> new Date(v.fecha||Date.now()).toDateString()===obtenerHoy()).length;
}

function ventasMes(){
 let m=new Date().getMonth();
 return ventas.filter(v=> new Date(v.fecha||Date.now()).getMonth()===m).length;
}

// modificar vender para guardar fecha
let _venderOriginal = vender;
vender = function(i){
 if(productos[i].stock<=0)return;
 productos[i].stock--;

 let venta = {...productos[i], fecha:new Date().toISOString()};
 ventas.push(venta);

 if(productos[i].costo==850) conteoData.potes++;
 if(productos[i].costo==2900) conteoData.tinas++;

 guardar(); render();
}

// agregar info visual
function extraInfo(){
 let div = document.getElementById("extraInfo");
 if(!div){
   div=document.createElement("div");
   div.id="extraInfo";
   document.body.appendChild(div);
 }

 div.innerHTML = `
 <div style="position:fixed;bottom:10px;right:10px;background:white;padding:10px;border-radius:10px">
 📅 Hoy: ${ventasHoy()}<br>
 📆 Mes: ${ventasMes()}
 </div>`;
}
