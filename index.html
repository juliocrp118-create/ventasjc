<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VentasJC</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: url('fondo.jpg') no-repeat center center fixed;
  background-size: cover;
}

.overlay{
  background:rgba(0,0,0,0.45);
  min-height:100vh;
  padding:20px;
  color:white;
}

#loginDiv{display:flex;justify-content:center;align-items:center}

.login-box{
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:15px;
  text-align:center;
}

input{margin:5px;padding:10px;border-radius:8px;border:none}
button{padding:10px;margin:5px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.agregar{background:#00c853;color:white}
.logout{background:#ff5252;color:white;float:right}

.flex{display:flex;gap:20px}
.col{flex:1}

.card{background:white;color:black;padding:15px;margin:10px 0;border-radius:12px}

.grid{display:flex;gap:20px;margin-top:20px;flex-wrap:wrap;justify-content:center}
.box{background:white;color:black;padding:15px;border-radius:12px;width:220px;text-align:center;font-weight:bold}

.center{text-align:center;margin-top:20px}
</style>
</head>

<body>

<div id="loginDiv" class="overlay">
  <div class="login-box">
    <h2>Login VentasJC</h2>
    <input id="user" placeholder="Usuario"><br>
    <input id="pass" type="password" placeholder="Contraseña"><br>
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" class="overlay" style="display:none;">

<button class="logout" onclick="logout()">Cerrar sesión</button>

<h2>VentasJC</h2>

<input id="nombre" placeholder="Nombre">
<input id="stock" placeholder="Stock">
<input id="costo" placeholder="Costo (850 o 2900)">
<input id="precio" placeholder="Precio">
<button class="agregar" onclick="agregar()">Agregar</button>

<div class="flex">
<div class="col"><h3>Potes 1L</h3><div id="potes"></div></div>
<div class="col"><h3>Tinas 4L</h3><div id="tinas"></div></div>
</div>

<div class="grid">
  <div class="box">
    💰 Ganancias<br><br>
    Potes: <span id="gananciasPotes">0</span><br>
    Tinas: <span id="gananciasTinas">0</span>
  </div>

  <div class="box">
    📦 Inversión<br><br>
    Potes: <span id="inversionPotes">0</span><br>
    Tinas: <span id="inversionTinas">0</span>
  </div>

  <div class="box">
    🔄 Reinvertir<br><br>
    Potes: <span id="reinvertirPotes">0</span><br>
    Tinas: <span id="reinvertirTinas">0</span>
  </div>

  <div class="box">
    💵 Hoy<br><br>
    Potes: <span id="hoyPotes">0</span><br>
    Tinas: <span id="hoyTinas">0</span>
  </div>
</div>

<div class="center">
<h3>Ventas</h3>
<p id="conteoTexto"></p>
<button onclick="reiniciar()">Reiniciar</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyDgTmtl4VoF2UahIDZGVwQ11TuayHv2eHw",
 authDomain: "ventasjc-b1a1d.firebaseapp.com",
 projectId: "ventasjc-b1a1d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 mejora sincronización
firebase.firestore().enablePersistence().catch(()=>{});

let productos=[];
let conteoData={potes:0,tinas:0};

let gPotes=0, gTinas=0;
let rPotes=0, rTinas=0;
let hPotes=0, hTinas=0;

function login(){
 let u=user.value.trim();
 let p=pass.value.trim();
 if(u==="Julio" && p==="1234*"){
  loginDiv.style.display="none";
  app.style.display="block";
 }else{
  alert("Datos incorrectos");
 }
}

function logout(){
 app.style.display="none";
 loginDiv.style.display="flex";
}

function agregar(){

 let c = +costo.value;
 let tipo = "";

 if(c === 850){
   tipo = "pote";
 }else if(c === 2900){
   tipo = "tina";
 }else{
   alert("Costo inválido");
   return;
 }

 let nuevo={
  nombre:nombre.value,
  stock:+stock.value,
  costo:c,
  precio:+precio.value,
  tipo:tipo
 };

 db.collection("productos").add(nuevo);
}

// 🔥 SINCRONIZACIÓN REAL ARREGLADA
db.collection("productos").onSnapshot(function(snapshot){

 console.log("🔥 Firebase conectado");

 productos = [];

 snapshot.forEach(function(doc){
   let data = doc.data();
   data.id = doc.id;
   productos.push(data);
 });

 render();

}, function(error){
 console.error("❌ Error Firebase:", error);
});

function vender(id,i){
 let p=productos[i];
 if(p.stock<=0)return;

 db.collection("productos").doc(id).update({stock:p.stock-1});

 let g=p.precio-p.costo;

 if(p.tipo==="pote"){
  gPotes+=g;
  rPotes+=p.costo;
  hPotes+=p.precio;
  conteoData.potes++;
 }else{
  gTinas+=g;
  rTinas+=p.costo;
  hTinas+=p.precio;
  conteoData.tinas++;
 }

 render();
}

function editar(id,i){
 let n=prompt("Nuevo stock:",productos[i].stock);
 if(n!==null){
  db.collection("productos").doc(id).update({stock:+n});
 }
}

function eliminar(id){
 db.collection("productos").doc(id).delete();
}

function reiniciar(){
 conteoData={potes:0,tinas:0};
 gPotes=gTinas=0;
 rPotes=rTinas=0;
 hPotes=hTinas=0;
 render();
}

function render(){

 let pHTML="",tHTML="";
 let invP=0, invT=0;

 productos.forEach((p,i)=>{

   if(p.tipo==="pote"){
     invP += p.stock * p.costo;
   }else{
     invT += p.stock * p.costo;
   }

   let card=`<div class='card'>
   ${p.nombre}<br>
   Stock:${p.stock}<br>
   <button onclick="vender('${p.id}',${i})">Vender</button>
   <button onclick="editar('${p.id}',${i})">Editar</button>
   <button onclick="eliminar('${p.id}')">Eliminar</button>
   </div>`;

   if(p.tipo==="pote") pHTML+=card;
   else tHTML+=card;
 });

 potes.innerHTML=pHTML;
 tinas.innerHTML=tHTML;

 conteoTexto.innerHTML=`Potes:${conteoData.potes} | Tinas:${conteoData.tinas}`;

 document.getElementById("gananciasPotes").innerText=gPotes;
 document.getElementById("gananciasTinas").innerText=gTinas;

 document.getElementById("inversionPotes").innerText=invP;
 document.getElementById("inversionTinas").innerText=invT;

 document.getElementById("reinvertirPotes").innerText=rPotes;
 document.getElementById("reinvertirTinas").innerText=rTinas;

 document.getElementById("hoyPotes").innerText=hPotes;
 document.getElementById("hoyTinas").innerText=hTinas;
}

</script>

</body>
</html>
