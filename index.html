<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VentasJC PRO</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#111;
  color:white;
}

.overlay{
  padding:20px;
}

input{
  margin:5px;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.agregar{background:#00c853;color:white}
.logout{background:#ff5252;color:white;float:right}

.flex{display:flex;gap:20px;flex-wrap:wrap}
.col{flex:1;min-width:300px}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px 0;
  border-radius:12px
}

.grid{
  display:flex;
  gap:20px;
  margin-top:20px;
  flex-wrap:wrap;
  justify-content:center
}

.box{
  background:white;
  color:black;
  padding:15px;
  border-radius:12px;
  width:220px;
  text-align:center;
  font-weight:bold
}
</style>
</head>

<body>

<div id="loginDiv" class="overlay">
  <h2>Login</h2>
  <input id="user" placeholder="Usuario"><br>
  <input id="pass" type="password" placeholder="Contraseña"><br>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" class="overlay" style="display:none;">

<button class="logout" onclick="logout()">Salir</button>

<h2>VentasJC PRO</h2>

<input id="nombre" placeholder="Nombre">
<input id="stock" type="number" placeholder="Stock">
<input id="costo" type="number" placeholder="Costo (850 o 2900)">
<input id="precio" type="number" placeholder="Precio">
<button class="agregar" onclick="agregar()">Agregar</button>

<div class="flex">
  <div class="col"><h3>Potes</h3><div id="potes"></div></div>
  <div class="col"><h3>Tinas</h3><div id="tinas"></div></div>
</div>

<div class="grid">
  <div class="box">💰 Potes: <span id="gananciasPotes">0</span></div>
  <div class="box">💰 Tinas: <span id="gananciasTinas">0</span></div>
  <div class="box">📦 Inv Potes: <span id="invPotes">0</span></div>
  <div class="box">📦 Inv Tinas: <span id="invTinas">0</span></div>
</div>

<div>
<h3>Ventas</h3>
<p id="conteo"></p>
<button onclick="reiniciar()">Reiniciar TODO</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgTmtl4VoF2UahIDZGVwQ11TuayHv2eHw",
  authDomain: "ventasjc-b1a1d.firebaseapp.com",
  projectId: "ventasjc-b1a1d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let productos=[];
let gP=0,gT=0,cP=0,cT=0;

function login(){
 if(user.value==="Julio" && pass.value==="1234*"){
  loginDiv.style.display="none";
  app.style.display="block";
 }
}

function logout(){
 app.style.display="none";
 loginDiv.style.display="block";
}

function agregar(){

 let c=+costo.value;
 let tipo="";

 if(c===850) tipo="pote";
 else if(c===2900) tipo="tina";
 else return alert("Costo inválido");

 db.collection("productos").add({
  nombre:nombre.value,
  stock:+stock.value,
  costo:c,
  precio:+precio.value,
  tipo:tipo,
  fecha: firebase.firestore.FieldValue.serverTimestamp() // 🔥 ORDEN
 });
}

db.collection("productos")
.orderBy("fecha","asc")
.onSnapshot(snap=>{

 productos=[];
 snap.forEach(doc=>{
  let d=doc.data();
  d.id=doc.id;
  productos.push(d);
 });

 render();
});

db.collection("ventas")
.orderBy("fecha","asc")
.onSnapshot(snap=>{

 gP=gT=0;
 cP=cT=0;

 snap.forEach(doc=>{
  let v=doc.data();

  if(v.tipo==="pote"){
    gP+=v.ganancia;
    cP++;
  }else{
    gT+=v.ganancia;
    cT++;
  }
 });

 render();
});

function vender(id,i){

 let p=productos[i];
 if(p.stock<=0)return;

 db.collection("productos").doc(id).update({
  stock:p.stock-1
 });

 db.collection("ventas").add({
  tipo:p.tipo,
  ganancia:p.precio-p.costo,
  fecha: firebase.firestore.FieldValue.serverTimestamp()
 });
}

function eliminar(id){
 db.collection("productos").doc(id).delete();
}

async function reiniciar(){

 let ok=confirm("Borrar TODAS las ventas?");
 if(!ok)return;

 let snap=await db.collection("ventas").get();

 let batch=db.batch();
 snap.forEach(doc=>batch.delete(doc.ref));
 await batch.commit();
}

function render(){

 let pHTML="",tHTML="";
 let invP=0,invT=0;

 productos.forEach((p,i)=>{

   if(p.tipo==="pote") invP+=p.stock*p.costo;
   else invT+=p.stock*p.costo;

   let card=`
   <div class='card'>
   ${p.nombre}<br>
   Stock:${p.stock}<br>
   <button onclick="vender('${p.id}',${i})">Vender</button>
   <button onclick="eliminar('${p.id}')">Eliminar</button>
   </div>`;

   if(p.tipo==="pote") pHTML+=card;
   else tHTML+=card;
 });

 potes.innerHTML=pHTML;
 tinas.innerHTML=tHTML;

 gananciasPotes.innerText=gP;
 gananciasTinas.innerText=gT;

 invPotes.innerText=invP;
 invTinas.innerText=invT;

 conteo.innerText=`Potes:${cP} | Tinas:${cT}`;
}
</script>

</body>
</html>
