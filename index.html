<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VentasJC PRO</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: url('fondo.jpg') no-repeat center center fixed;
  background-size: cover;
}

.overlay{
  background:rgba(0,0,0,0.45);
  min-height:100vh;
  padding:20px;
  color:white;
}

#loginDiv{
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:15px;
  text-align:center;
}

input{
  margin:5px;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.agregar{background:#00c853;color:white}
.logout{background:#ff5252;color:white;float:right}

.flex{display:flex;gap:20px}
.col{flex:1}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.col h3{
  text-align:center;
  background:rgba(255,255,255,0.2);
  padding:10px;
  border-radius:10px;
}

.grid{
 display:flex;
 gap:20px;
 margin-top:20px;
 justify-content:center;
}

.box{
 background:white;
 color:black;
 padding:15px;
 border-radius:12px;
 width:220px;
 text-align:center;
 font-weight:bold;
}

.center{text-align:center;margin-top:20px}
</style>

</head>
<body>

<div id="loginDiv" class="overlay">
  <div class="login-box">
    <h2>Login VentasJC</h2>
    <input id="user" placeholder="Usuario"><br>
    <input id="pass" type="password" placeholder="Contraseña"><br>
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" class="overlay" style="display:none;">

<button class="logout" onclick="logout()">Cerrar sesión</button>

<h2>VentasJC PRO</h2>

<input id="nombre" placeholder="Nombre">
<input id="stock" placeholder="Stock">
<input id="costo" placeholder="Costo">
<input id="precio" placeholder="Precio">
<button class="agregar" onclick="agregar()">Agregar</button>

<div class="flex">
<div class="col"><h3>🥤 Potes 1L</h3><div id="potes"></div></div>
<div class="col"><h3>🪣 Tinas 4L</h3><div id="tinas"></div></div>
</div>

<div class="grid">
  <div class="box">
    🥤 Potes<br>
    💰 <span id="gananciasPotes">0</span><br>
    📦 <span id="inversionPotes">0</span><br>
    🔄 <span id="reinvertirPotes">0</span>
  </div>

  <div class="box">
    🪣 Tinas<br>
    💰 <span id="gananciasTinas">0</span><br>
    📦 <span id="inversionTinas">0</span><br>
    🔄 <span id="reinvertirTinas">0</span>
  </div>

  <div class="box">
    💵 Hoy<br>
    <span id="cajaHoy">0</span>
  </div>
</div>

<div class="center">
<h3>Ventas</h3>
<p id="conteoTexto"></p>
<button onclick="reiniciar()">Reiniciar Conteo</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDgTmtl4VoF2UahIDZGVwQ11TuayHv2eHw",
  authDomain: "ventasjc-b1a1d.firebaseapp.com",
  projectId: "ventasjc-b1a1d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let productos = [];
let conteoData = {potes:0,tinas:0};

let gananciasPotes = 0;
let inversionPotes = 0;
let reinvertirPotes = 0;

let gananciasTinas = 0;
let inversionTinas = 0;
let reinvertirTinas = 0;

let cajaHoy = 0;

function login(){
 if(user.value==="Julio" && pass.value==="1234*"){
  loginDiv.style.display="none";
  app.style.display="block";
 }
}

function logout(){
 app.style.display="none";
 loginDiv.style.display="flex";
}

function agregar(){
 let nuevo = {
   nombre:nombre.value,
   stock:+stock.value,
   costo:+costo.value,
   precio:+precio.value,
   tipo:(+costo.value)==850?"pote":"tina"
 };
 db.collection("productos").add(nuevo);
}

db.collection("productos").onSnapshot(snapshot=>{
 productos=[];
 snapshot.forEach(doc=>{
   let data=doc.data();
   data.id=doc.id;
   productos.push(data);
 });
 render();
});

function vender(id,i){
 if(productos[i].stock<=0)return;

 let p = productos[i];

 db.collection("productos").doc(id).update({stock:p.stock-1});

 let ganancia = p.precio - p.costo;

 if(p.tipo==="pote"){
   gananciasPotes += ganancia;
   inversionPotes += p.costo;
   reinvertirPotes += p.costo;
   conteoData.potes++;
 }else{
   gananciasTinas += ganancia;
   inversionTinas += p.costo;
   reinvertirTinas += p.costo;
   conteoData.tinas++;
 }

 cajaHoy += p.precio;

 render();
}

function eliminar(id){
 db.collection("productos").doc(id).delete();
}

function reiniciar(){
 conteoData={potes:0,tinas:0};
 gananciasPotes=0;
 inversionPotes=0;
 reinvertirPotes=0;
 gananciasTinas=0;
 inversionTinas=0;
 reinvertirTinas=0;
 cajaHoy=0;
 render();
}

function render(){
 let pHTML="",tHTML="";

 productos.forEach((p,i)=>{
 let card=`<div class='card'>
 ${p.nombre}<br>
 Stock:${p.stock}<br>
 <button onclick="vender('${p.id}',${i})">Vender</button>
 <button onclick="eliminar('${p.id}')">Eliminar</button>
 </div>`;

 if(p.tipo==="pote") pHTML+=card;
 else tHTML+=card;
 });

 potes.innerHTML=pHTML;
 tinas.innerHTML=tHTML;

 conteoTexto.innerHTML = "Potes: "+conteoData.potes+" | Tinas: "+conteoData.tinas;

 gananciasPotes.innerText = gananciasPotes;
 inversionPotes.innerText = inversionPotes;
 reinvertirPotes.innerText = reinvertirPotes;

 gananciasTinas.innerText = gananciasTinas;
 inversionTinas.innerText = inversionTinas;
 reinvertirTinas.innerText = reinvertirTinas;

 cajaHoy.innerText = cajaHoy;
}

</script>

</body>
</html>
