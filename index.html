<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VentasJC</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: url('fondo.jpg') no-repeat center center fixed;
  background-size: cover;
}

.overlay{
  background:rgba(0,0,0,0.45);
  min-height:100vh;
  padding:20px;
  color:white;
}

#loginDiv{
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:15px;
  text-align:center;
}

input{
  margin:5px;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.agregar{
  background:#00c853;
  color:white;
}

.logout{
  background:#ff5252;
  color:white;
  float:right;
}

.flex{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.col{
  flex:1;
  min-width:300px;
}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
}

.grid{
  display:flex;
  gap:20px;
  margin-top:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.box{
  background:white;
  color:black;
  padding:15px;
  border-radius:12px;
  width:220px;
  text-align:center;
  font-weight:bold;
}

.center{
  text-align:center;
  margin-top:20px;
}
</style>
</head>

<body>

<div id="loginDiv" class="overlay">
  <div class="login-box">
    <h2>Login VentasJC</h2>
    <input id="user" placeholder="Usuario"><br>
    <input id="pass" type="password" placeholder="Contraseña"><br>
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" class="overlay" style="display:none;">

  <button class="logout" onclick="logout()">Cerrar sesión</button>

  <h2>VentasJC</h2>

  <input id="nombre" placeholder="Nombre">
  <input id="stock" type="number" placeholder="Stock">
  <input id="costo" type="number" placeholder="Costo (850 o 2900)">
  <input id="precio" type="number" placeholder="Precio">
  <button class="agregar" onclick="agregar()">Agregar</button>

  <div class="flex">
    <div class="col">
      <h3>Potes 1L</h3>
      <div id="potes"></div>
    </div>

    <div class="col">
      <h3>Tinas 4L</h3>
      <div id="tinas"></div>
    </div>
  </div>

  <div class="grid">
    <div class="box">
      💰 Ganancias<br><br>
      Potes: <span id="gananciasPotes">0</span><br>
      Tinas: <span id="gananciasTinas">0</span>
    </div>

    <div class="box">
      📦 Inversión<br><br>
      Potes: <span id="inversionPotes">0</span><br>
      Tinas: <span id="inversionTinas">0</span>
    </div>

    <div class="box">
      🔄 Reinvertir<br><br>
      Potes: <span id="reinvertirPotes">0</span><br>
      Tinas: <span id="reinvertirTinas">0</span>
    </div>

    <div class="box">
      💵 Hoy<br><br>
      Potes: <span id="hoyPotes">0</span><br>
      Tinas: <span id="hoyTinas">0</span>
    </div>
  </div>

  <div class="center">
    <h3>Ventas</h3>
    <p id="conteoTexto"></p>
    <button onclick="reiniciar()">Reiniciar</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgTmtl4VoF2UahIDZGVwQ11TuayHv2eHw",
  authDomain: "ventasjc-b1a1d.firebaseapp.com",
  projectId: "ventasjc-b1a1d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let productos = [];
let ventas = [];

let conteoData = { potes: 0, tinas: 0 };
let gPotes = 0, gTinas = 0;
let rPotes = 0, rTinas = 0;
let hPotes = 0, hTinas = 0;

function login(){
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pass").value.trim();

  if(u === "Julio" && p === "1234*"){
    document.getElementById("loginDiv").style.display = "none";
    document.getElementById("app").style.display = "block";
  }else{
    alert("Datos incorrectos");
  }
}

function logout(){
  document.getElementById("app").style.display = "none";
  document.getElementById("loginDiv").style.display = "flex";
}

function agregar(){
  let nombreValor = document.getElementById("nombre").value.trim();
  let stockValor = Number(document.getElementById("stock").value);
  let costoValor = Number(document.getElementById("costo").value);
  let precioValor = Number(document.getElementById("precio").value);

  if(!nombreValor){
    alert("Escribe el nombre del producto");
    return;
  }

  if(isNaN(stockValor) || stockValor < 0){
    alert("Stock inválido");
    return;
  }

  if(isNaN(precioValor) || precioValor <= 0){
    alert("Precio inválido");
    return;
  }

  let tipo = "";

  if(costoValor === 850){
    tipo = "pote";
  }else if(costoValor === 2900){
    tipo = "tina";
  }else{
    alert("Costo inválido (850 o 2900)");
    return;
  }

  let nuevo = {
    nombre: nombreValor,
    stock: stockValor,
    costo: costoValor,
    precio: precioValor,
    tipo: tipo
  };

  db.collection("productos").add(nuevo)
    .then(() => {
      document.getElementById("nombre").value = "";
      document.getElementById("stock").value = "";
      document.getElementById("costo").value = "";
      document.getElementById("precio").value = "";
    })
    .catch(error => {
      alert("Error al agregar: " + error.message);
    });
}

db.collection("productos").onSnapshot(snapshot => {
  productos = [];
  snapshot.forEach(doc => {
    let d = doc.data();
    d.id = doc.id;
    productos.push(d);
  });
  render();
}, error => {
  console.error("Error leyendo productos:", error);
});

db.collection("ventas").onSnapshot(snapshot => {
  ventas = [];
  gPotes = 0;
  gTinas = 0;
  rPotes = 0;
  rTinas = 0;
  hPotes = 0;
  hTinas = 0;
  conteoData = { potes: 0, tinas: 0 };

  snapshot.forEach(doc => {
    let v = doc.data();
    v.id = doc.id;
    ventas.push(v);

    if(v.tipo === "pote"){
      gPotes += Number(v.ganancia || 0);
      rPotes += Number(v.costo || 0);
      hPotes += Number(v.precio || 0);
      conteoData.potes++;
    }else if(v.tipo === "tina"){
      gTinas += Number(v.ganancia || 0);
      rTinas += Number(v.costo || 0);
      hTinas += Number(v.precio || 0);
      conteoData.tinas++;
    }
  });

  render();
}, error => {
  console.error("Error leyendo ventas:", error);
});

function vender(id, i){
  let p = productos[i];

  if(!p){
    alert("Producto no encontrado");
    return;
  }

  if(p.stock <= 0){
    alert("No hay stock disponible");
    return;
  }

  db.collection("productos").doc(id).update({
    stock: p.stock - 1
  })
  .then(() => {
    return db.collection("ventas").add({
      productoId: id,
      nombre: p.nombre,
      tipo: p.tipo,
      costo: p.costo,
      precio: p.precio,
      ganancia: p.precio - p.costo,
      fecha: firebase.firestore.FieldValue.serverTimestamp()
    });
  })
  .catch(error => {
    alert("Error al vender: " + error.message);
  });
}

function editar(id, i){
  let producto = productos[i];
  if(!producto) return;

  let n = prompt("Nuevo stock:", producto.stock);

  if(n === null) return;

  let nuevoStock = Number(n);

  if(isNaN(nuevoStock) || nuevoStock < 0){
    alert("Stock inválido");
    return;
  }

  db.collection("productos").doc(id).update({
    stock: nuevoStock
  }).catch(error => {
    alert("Error al editar: " + error.message);
  });
}

function eliminar(id){
  if(!confirm("¿Seguro que quieres eliminar este producto?")) return;

  db.collection("productos").doc(id).delete()
    .catch(error => {
      alert("Error al eliminar: " + error.message);
    });
}

async function reiniciar(){
  let ok = confirm("Esto borrará TODAS las ventas para todos los dispositivos. ¿Continuar?");
  if(!ok) return;

  try{
    const snapshot = await db.collection("ventas").get();

    let batch = db.batch();
    snapshot.forEach(doc => {
      batch.delete(doc.ref);
    });

    await batch.commit();
    alert("Ventas reiniciadas correctamente");
  }catch(error){
    alert("Error al reiniciar: " + error.message);
  }
}

function render(){
  let pHTML = "";
  let tHTML = "";
  let invP = 0;
  let invT = 0;

  productos.forEach((p, i) => {
    if(p.tipo === "pote"){
      invP += Number(p.stock || 0) * Number(p.costo || 0);
    }else{
      invT += Number(p.stock || 0) * Number(p.costo || 0);
    }

    let card = `
      <div class="card">
        <b>${p.nombre}</b><br>
        Stock: ${p.stock}<br>
        Costo: ${p.costo}<br>
        Precio: ${p.precio}<br><br>
        <button onclick="vender('${p.id}', ${i})">Vender</button>
        <button onclick="editar('${p.id}', ${i})">Editar</button>
        <button onclick="eliminar('${p.id}')">Eliminar</button>
      </div>
    `;

    if(p.tipo === "pote"){
      pHTML += card;
    }else{
      tHTML += card;
    }
  });

  document.getElementById("potes").innerHTML = pHTML;
  document.getElementById("tinas").innerHTML = tHTML;

  document.getElementById("conteoTexto").innerHTML =
    `Potes: ${conteoData.potes} | Tinas: ${conteoData.tinas}`;

  document.getElementById("gananciasPotes").innerText = gPotes;
  document.getElementById("gananciasTinas").innerText = gTinas;

  document.getElementById("inversionPotes").innerText = invP;
  document.getElementById("inversionTinas").innerText = invT;

  document.getElementById("reinvertirPotes").innerText = rPotes;
  document.getElementById("reinvertirTinas").innerText = rTinas;

  document.getElementById("hoyPotes").innerText = hPotes;
  document.getElementById("hoyTinas").innerText = hTinas;
}
</script>

</body>
</html>
